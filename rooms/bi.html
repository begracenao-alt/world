<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>美 BEAUTY辞典｜Be Grace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #fcfdfe;
    --ivory-deep: #eaf2f6;
    --ink: #2f2e2c;
    --ink-soft: #6c6a64;
    --ink-faint: #a6a29b;
    --gold: #3a96bf;
    --line: rgba(60, 56, 51, 0.10);
    --card: rgba(255, 255, 255, 0.6);
    --accent: #c6a965;       /* 美 — 金 */
    --accent-deep: #9c7f44;
    --accent-soft: rgba(196, 168, 109, 0.14);
    --shadow: 0 18px 50px -28px rgba(70, 60, 45, 0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fbfdff 0%, rgba(251,248,242,0) 55%),
      linear-gradient(180deg, var(--ivory) 0%, var(--ivory-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.9;
    letter-spacing: 0.04em;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 640px; margin: 0 auto; padding: 0 22px; }

  .top { padding: 26px 0 8px; }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 15px; letter-spacing: 0.12em; color: var(--ink-soft);
    text-decoration: none; transition: color .3s; background: none; border: none; cursor: pointer;
  }
  .back:hover { color: var(--ink); }

  .head { text-align: center; padding: 22px 0 6px; }
  .head__name { font-size: clamp(38px, 10vw, 56px); font-weight: 500; letter-spacing: 0.18em; }
  .head__copy { margin-top: 12px; font-size: 14px; letter-spacing: 0.20em; color: var(--ink-soft); }
  .head__line { width: 1px; height: 36px; margin: 16px auto 0;
    background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: .7; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    box-shadow: var(--shadow); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: clamp(26px, 6vw, 38px) clamp(22px, 5vw, 32px);
    margin: 22px 0;
  }
  .card__label {
    text-align: center; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 14px; letter-spacing: 0.28em; color: var(--accent-deep); text-transform: uppercase;
  }
  .card__ja { text-align: center; font-size: 13px; letter-spacing: 0.30em; color: var(--ink-faint); margin-top: 6px; }
  .lead { text-align: center; font-size: 14.5px; color: var(--ink-soft); letter-spacing: 0.08em; line-height: 2.0; }

  .controls { display: flex; justify-content: center; gap: 14px; margin-top: 24px; flex-wrap: wrap; }
  .btn {
    font-family: inherit; font-size: 15px; letter-spacing: 0.16em; cursor: pointer;
    border-radius: 999px; padding: 13px 30px; transition: all .3s; border: 1px solid var(--accent);
  }
  .btn--ghost { background: transparent; color: var(--ink-soft); border-color: var(--line); }
  .btn--ghost:hover { border-color: var(--accent); color: var(--ink); }

  .is-hidden { display: none !important; }

  /* テーマ一覧 */
  .choices { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 26px; justify-content: center; }
  .choice {
    font-family: inherit; font-size: 14.5px; letter-spacing: 0.06em; color: var(--ink);
    background: rgba(255,255,255,0.6); border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 20px; cursor: pointer; transition: all .3s;
  }
  .choice:hover { border-color: var(--accent); background: rgba(255,255,255,0.92); transform: translateY(-2px); }

  /* 美容習慣の積み上げ */
  .habit-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 22px; }
  .habit {
    font-family: inherit; font-size: 14px; letter-spacing: 0.04em; color: var(--ink);
    background: rgba(255,255,255,0.6); border: 1px solid var(--line); border-radius: 999px;
    padding: 11px 16px; cursor: pointer; transition: all .3s;
  }
  .habit:hover { border-color: var(--accent); }
  .habit.is-on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .stats { display: flex; justify-content: center; gap: 34px; margin-top: 26px; }
  .stat { text-align: center; }
  .stat__num { font-family: "Cormorant Garamond", serif; font-size: 32px; color: var(--accent-deep); line-height: 1.1; }
  .stat__label { font-size: 11px; letter-spacing: 0.14em; color: var(--ink-faint); margin-top: 4px; }
  .habit-msg { text-align: center; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.06em; margin-top: 18px; min-height: 20px; line-height: 1.8; }

  /* テーマ詳細 */
  .result__type { text-align: center; margin-bottom: 6px; }
  .result__crown { font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 0.2em;
    color: var(--accent-deep); font-size: 14px; text-transform: uppercase; }
  .result__name { font-size: clamp(28px, 7.5vw, 40px); font-weight: 500; letter-spacing: 0.10em; margin-top: 8px; }

  .block { margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--line); }
  .block:first-of-type { border-top: none; }
  .block__h { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .block__en { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 13px;
    letter-spacing: 0.16em; color: var(--accent-deep); text-transform: uppercase; flex: none; }
  .block__ja { font-size: 15px; letter-spacing: 0.10em; font-weight: 500; }
  .block p { font-size: 14.5px; letter-spacing: 0.04em; line-height: 1.95; color: var(--ink); }
  .block ul { list-style: none; margin-top: 6px; }
  .block li { position: relative; padding-left: 20px; margin-bottom: 10px; font-size: 14.5px; line-height: 1.85; }
  .block li::before { content: "—"; position: absolute; left: 0; color: var(--accent); }

  .grace { background: var(--accent-soft); border-radius: 8px; padding: 22px 20px; margin-top: 26px; }
  .grace p { font-size: 14.5px; line-height: 2.1; letter-spacing: 0.06em; text-align: center; }
  .tokarada { text-align: center; margin-top: 18px; }
  .tokarada a { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 14px;
    letter-spacing: 0.1em; color: var(--accent-deep); text-decoration: underline; text-underline-offset: 4px; }

  /* 関連コンテンツ（後から差し替え可能・今は空） */
  .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .link-chip {
    display: inline-flex; align-items: center; gap: 8px; font-family: inherit; font-size: 13.5px;
    letter-spacing: 0.04em; color: var(--ink); background: rgba(255,255,255,0.6);
    border: 1px solid var(--line); border-radius: 999px; padding: 9px 16px; cursor: pointer;
    text-decoration: none; transition: all .3s;
  }
  .link-chip:hover { border-color: var(--accent); background: rgba(255,255,255,0.9); }
  .link-chip__kind { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 11px;
    letter-spacing: 0.1em; color: var(--accent-deep); }

  .foot { text-align: center; padding: 30px 0 56px; }
  .foot__title { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 20px; letter-spacing: 0.3em; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../index.html">← Be Grace</a>
    </div>

    <div class="head">
      <div class="head__name">美</div>
      <div class="head__copy">足すより、引く美容</div>
      <div class="head__line"></div>
    </div>

    <!-- ============ テーマ一覧 ============ -->
    <section id="viewIndex">
      <div class="card">
        <div class="card__label">Beauty</div>
        <div class="card__ja">BEAUTY辞典</div>
        <p class="lead" style="margin-top:20px">
          気になるテーマを、<br>ひとつ選んでください。<br>
          足すより、引く。體の土台が整うほど、<br>
          5年後も、10年後も、美しく。
        </p>
        <div class="choices" id="themeChoices"></div>
      </div>

      <div class="card">
        <div class="card__label">Habit</div>
        <div class="card__ja">美容習慣の積み上げ</div>
        <p class="lead" style="margin-top:18px">今日できたことを、そっとタップ。<br>足すより、つづける。</p>
        <div class="habit-row" id="habitRow"></div>
        <div class="stats">
          <div class="stat"><div class="stat__num" id="habToday">0</div><div class="stat__label">今日できた</div></div>
          <div class="stat"><div class="stat__num" id="habStreak">0</div><div class="stat__label">続けた日数</div></div>
        </div>
        <div class="habit-msg" id="habMsg"></div>
      </div>
    </section>

    <!-- ============ テーマ詳細 ============ -->
    <section id="viewTheme" class="is-hidden">
      <div class="card" id="themeCard"></div>
      <div class="controls"><button class="back" id="themeExit">← 辞典にもどる</button></div>
    </section>

    <div class="foot"><div class="foot__title">Be Grace</div></div>
  </div>

<script>
(function () {
  "use strict";

  /* =========================================================
     ▼▼▼ 関連コンテンツ（おすすめリンク枠）▼▼▼
     テーマごとに、講座・資料・動画のリンクを表示できます。
     ・後から自由に追加・削除・差し替えできます（その行のURLを変えるだけ）。
     ・Vimeo・YouTube・Googleスライド/ドキュメント/ドライブ等に対応。
     ・空のテーマは「つながる場所」を表示しません。
       例:
       mukumi: [ { title: "むくみを流すワーク", url: "https://vimeo.com/showcase/0000000" } ]
     ========================================================= */
  var LINKS = {
    wakagaeri: [], bihaku: [], diet: [], kogao: [], mukumi: [],
    kubire: [], bihada: [], hormone: [], shiraga: [], tsuyagami: []
  };
  /* ▲▲▲ ここまで ▲▲▲ */

  // ===== テーマ一覧 =====
  var THEMES = [
    { k: "wakagaeri", label: "若返り" },
    { k: "bihaku",    label: "美白" },
    { k: "diet",      label: "ダイエット" },
    { k: "kogao",     label: "小顔" },
    { k: "mukumi",    label: "むくみ" },
    { k: "kubire",    label: "くびれ" },
    { k: "bihada",    label: "美肌" },
    { k: "hormone",   label: "ホルモン" },
    { k: "shiraga",   label: "白髪予防" },
    { k: "tsuyagami", label: "ツヤ髪" }
  ];

  // ===== 各テーマの内容 =====
  var THEME_DATA = {
    wakagaeri: {
      why: "年齢そのものより、巡りの低下・睡眠の質・乾燥・酸化などで、肌や印象は変わって見えます。逆に言えば、土台が整うほど、印象はいきいきと戻っていきます。",
      body: "肌は、眠っているあいだに生まれ変わります。呼吸が浅いと巡りが落ち、首のこわばりは顔のたるみにつながります。腸の調子は、肌のつやに直結します。",
      today: ["7〜8時間の睡眠を意識する", "ゆっくり深呼吸を数回", "首の運動たくさん", "水をこまめに飲む", "湯船で體を温める"],
      begrace: "若返りは、時間を戻すことではなく、本来の生命力を取り戻すこと。整った體には、年齢を超えた、いきいきとした美しさが宿ります。"
    },
    bihaku: {
      why: "紫外線や摩擦、巡りの停滞で、色ムラやくすみが出やすくなります。強くこすらず、めぐりを助けてあげることが近道です。",
      body: "血流とリンパの巡りが、肌の明るさを左右します。睡眠と腸の調子は、肌の生まれ変わりに関わります。",
      today: ["強い日差しを避ける（日陰・帽子）", "肌をこすらない", "水分をしっかりとる", "湯船で巡りを促す", "睡眠を確保する"],
      begrace: "白さを足すより、くもりを晴らすイメージ。巡るほどに、肌は内側から透明感を取り戻します。"
    },
    diet: {
      why: "体重そのものより、巡り・代謝・自律神経の乱れ、睡眠不足やストレスが、ため込みやすさにつながります。",
      body: "姿勢が整うと、呼吸が深まり、代謝も上がります。睡眠不足は食欲のリズムを乱し、腸が整うと巡りも軽くなります。歩くことは、全身のポンプです。",
      today: ["姿勢を整える", "よく噛んで食べる", "水を飲む", "少し多めに歩く", "早めに眠る"],
      begrace: "減らすより、めぐらせる。整った體は、自然とちょうどよい形へ戻っていきます。削るより、育てる體づくりを。"
    },
    kogao: {
      why: "顔の大きさの多くは、むくみと筋肉のこわばり。首・肩のつまりや食いしばりで巡りが滞ると、出やすくなります。",
      body: "首は、顔への巡りの通り道。肩こり・食いしばり・睡眠不足は、フェイスラインにあらわれます。",
      today: ["首の運動たくさん", "肩の力を、すとんと抜く", "食いしばりをゆるめる", "水分をとる", "湯船で温める"],
      begrace: "小顔は、削るものではなく、巡らせて軽くするもの。詰まりが流れれば、本来のラインが戻ります。"
    },
    mukumi: {
      why: "水分・塩分のバランス、長時間同じ姿勢、巡りの低下、冷えなどで、水分がたまりやすくなります。",
      body: "顔のむくみは首、脚のむくみは腰の巡りがカギ。首や腰がこわばると、水分がたまりやすくなります。冷えや浅い呼吸でも、流れは滞ります。",
      today: ["首の運動たくさん（顔のむくみに）", "腰の運動たくさん（脚のむくみに）", "水を適度にとる", "體を温める", "深呼吸で巡らせる"],
      begrace: "むくみは、巡りからの小さなサイン。流れを助けてあげれば、體は軽さを思い出します。"
    },
    kubire: {
      why: "姿勢の崩れ、呼吸の浅さ、体幹のゆるみで、ウエストはぼやけて見えます。",
      body: "深い呼吸は、おなかの奥の筋肉を使います。姿勢と骨盤まわり、腸の調子も、ラインに関わります。",
      today: ["姿勢を整える", "深い腹式呼吸", "腰の運動たくさん", "よく歩く", "腸を整える食事"],
      begrace: "くびれは、締めつけより、整えること。呼吸と姿勢が変われば、體は自然に美しい曲線を描きます。"
    },
    bihada: {
      why: "乾燥・摩擦・睡眠不足・腸の乱れに加えて、塩素やスキンケアの“足しすぎ”も、肌の負担になります。",
      body: "肌は、腸を映す鏡。眠っているあいだに修復され、巡りが栄養を運びます。呼吸と血流が、つやを左右します。",
      today: ["スキンケアは足しすぎない（必要なものだけ）", "塩素を除去する（シャワー・洗顔の水）", "こすらない", "睡眠をしっかりとる", "水分と発酵食品"],
      begrace: "美肌は、塗り重ねるより、引き算。必要なものだけにして、余計な刺激を減らすほど、肌は本来の力を取り戻します。"
    },
    hormone: {
      why: "睡眠不足・ストレス・冷え・不規則な生活が、ホルモンのリズムをゆらします。年齢のせいだけではありません。",
      body: "自律神経とホルモンは連動しています。睡眠・呼吸・温め・腸の状態が、心と體のバランスを支えます。",
      today: ["決まった時間に眠る", "深呼吸で、ゆるめる", "體を冷やさない", "朝の光を浴びる", "腸を整える"],
      begrace: "ホルモンは、整えるより、寄りそうもの。リズムを大切にすれば、體は自分でバランスを取り戻します。"
    },
    shiraga: {
      why: "加齢のほか、血流の低下・栄養不足・ストレス・睡眠の質が、髪の色素に関わると言われます。",
      body: "髪を育てるのは、首から頭への血流。首がこわばると、巡りが滞ります。東洋では、腰にある“腎”も髪に深く関わるとされます。",
      today: ["首の運動たくさん", "腰の運動たくさん（腰の腎に）", "黒い食べ物をとる（黒ごま・黒豆など）", "たんぱく質をとる", "睡眠を確保する"],
      begrace: "髪も、體の巡りの一部。頭皮にやさしく血をめぐらせるほど、髪は健やかさを取り戻します。"
    },
    tsuyagami: {
      why: "乾燥・摩擦・熱、栄養や巡りの不足で、髪のつやは失われやすくなります。",
      body: "髪は血流で育ち、腸の栄養とホルモンに支えられます。首のこわばりは、つやを曇らせます。",
      today: ["首の運動たくさん", "洗いすぎない（うるおいを守る）", "たんぱく質と水分", "睡眠をとる", "湯船で巡らせる"],
      begrace: "つやは、外から足す前に、内から巡らせて。健やかな土台が、自然な輝きを連れてきます。"
    }
  };

  // ===== 画面の切り替え =====
  function show(name) {
    document.getElementById("viewIndex").classList.toggle("is-hidden", name !== "index");
    document.getElementById("viewTheme").classList.toggle("is-hidden", name !== "theme");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ===== リンク（おすすめコンテンツ枠） =====
  function parseMedia(raw) {
    var url = (raw || "").trim();
    if (!url) return null;
    if (/youtu\.?be/.test(url)) return { kind: "Movie", src: url };
    if (/vimeo\.com/.test(url)) return { kind: "Movie", src: url };
    if (/docs\.google\.com\/presentation/.test(url)) return { kind: "Slide", src: url };
    if (/docs\.google\.com|drive\.google\.com|forms\.gle/.test(url)) return { kind: "Doc", src: url };
    if (/\.(mp3|m4a|ogg|wav|aac)(\?.*)?$/i.test(url)) return { kind: "Sound", src: url };
    return { kind: "Link", src: url };
  }
  function renderLinks(themeKey) {
    var items = (LINKS[themeKey] || []).filter(function (it) { return it && it.url; });
    if (!items.length) return null;
    var wrap = document.createElement("div"); wrap.className = "links";
    items.forEach(function (it) {
      var info = parseMedia(it.url);
      var a = document.createElement("a"); a.className = "link-chip";
      a.href = info.src; a.target = "_blank"; a.rel = "noopener";
      var kind = document.createElement("span"); kind.className = "link-chip__kind"; kind.textContent = info.kind;
      var t = document.createElement("span"); t.textContent = it.title || "ひらく";
      a.appendChild(kind); a.appendChild(t);
      wrap.appendChild(a);
    });
    return wrap;
  }

  // ===== 描画 =====
  function block(en, ja, bodyNode) {
    var b = document.createElement("div"); b.className = "block";
    var h = document.createElement("div"); h.className = "block__h";
    var e = document.createElement("span"); e.className = "block__en"; e.textContent = en;
    var j = document.createElement("span"); j.className = "block__ja"; j.textContent = ja;
    h.appendChild(e); h.appendChild(j); b.appendChild(h); b.appendChild(bodyNode);
    return b;
  }
  function pEl(text) { var p = document.createElement("p"); p.textContent = text; return p; }
  function ulEl(arr) {
    var ul = document.createElement("ul");
    arr.forEach(function (x) { var li = document.createElement("li"); li.textContent = x; ul.appendChild(li); });
    return ul;
  }

  function renderTheme(themeKey) {
    var th = THEMES.filter(function (t) { return t.k === themeKey; })[0];
    var d = THEME_DATA[themeKey];
    var card = document.getElementById("themeCard");
    card.innerHTML = "";

    var head = document.createElement("div"); head.className = "result__type";
    head.innerHTML =
      '<div class="result__crown">Beauty</div>' +
      '<div class="result__name">' + th.label + '</div>';
    card.appendChild(head);

    card.appendChild(block("Why", "なぜ起こるのか", pEl(d.why)));
    card.appendChild(block("Body", "體とのつながり", pEl(d.body)));
    card.appendChild(block("Today", "今日できること", ulEl(d.today)));

    var bg = document.createElement("div"); bg.className = "grace";
    var bp = document.createElement("p"); bp.textContent = d.begrace;
    bg.appendChild(bp);
    card.appendChild(block("Be Grace", "美しさは、體の土台から", bg));

    var links = renderLinks(themeKey);
    if (links) card.appendChild(block("Next", "つながる場所", links));

    var tk = document.createElement("div"); tk.className = "tokarada";
    tk.innerHTML = '<a href="karada.html">→ 體のお部屋で、ととのえる</a>';
    card.appendChild(tk);
  }

  // ===== テーマ一覧の描画・遷移 =====
  var box = document.getElementById("themeChoices");
  THEMES.forEach(function (t) {
    var b = document.createElement("button"); b.className = "choice"; b.textContent = t.label;
    b.addEventListener("click", function () { renderTheme(t.k); show("theme"); });
    box.appendChild(b);
  });
  document.getElementById("themeExit").addEventListener("click", function () { show("index"); });

  // ===== 美容習慣の積み上げ（この端末に保存・永続） =====
  var HABITS = [
    { k: "sleep",  label: "睡眠 7〜8時間" },
    { k: "water",  label: "水を飲む" },
    { k: "breath", label: "深呼吸" },
    { k: "neck",   label: "首の運動" },
    { k: "waist",  label: "腰の運動" },
    { k: "warm",   label: "湯船で温める" },
    { k: "thanks", label: "體にありがとう" }
  ];
  var HKEY = "bg_bi_habit";
  function hLoad() { try { return JSON.parse(localStorage.getItem(HKEY)) || {}; } catch (e) { return {}; } }
  function hSave(s) { try { localStorage.setItem(HKEY, JSON.stringify(s)); } catch (e) {} }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dstr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function today() { return dstr(new Date()); }
  function shiftDay(ds, n) { var p = ds.split("-"); var d = new Date(+p[0], +p[1] - 1, +p[2]); d.setDate(d.getDate() + n); return dstr(d); }

  var hs = hLoad();
  if (!hs.days) hs.days = [];
  if (!hs.done) hs.done = [];
  if (hs.day !== today()) { hs.day = today(); hs.done = []; hSave(hs); }

  function hStreak() {
    var set = {}; (hs.days || []).forEach(function (d) { set[d] = 1; });
    var cur = today(); if (!set[cur]) cur = shiftDay(cur, -1);
    var c = 0; while (set[cur]) { c++; cur = shiftDay(cur, -1); }
    return c;
  }
  var habitRow = document.getElementById("habitRow");
  var habToday = document.getElementById("habToday");
  var habStreak = document.getElementById("habStreak");
  var habMsg = document.getElementById("habMsg");

  function hRender() {
    habitRow.innerHTML = "";
    HABITS.forEach(function (h) {
      var b = document.createElement("button");
      b.className = "habit" + (hs.done.indexOf(h.k) >= 0 ? " is-on" : "");
      b.textContent = h.label;
      b.addEventListener("click", function () { hToggle(h.k); });
      habitRow.appendChild(b);
    });
    habToday.textContent = hs.done.length + " / " + HABITS.length;
    habStreak.textContent = hStreak();
    if (hs.done.length === HABITS.length) habMsg.textContent = "ぜんぶ整いました🤍";
    else if (hs.done.length > 0) habMsg.textContent = "いい積み重ねです🤍";
    else habMsg.textContent = "";
  }
  function hToggle(k) {
    var i = hs.done.indexOf(k);
    if (i >= 0) hs.done.splice(i, 1); else hs.done.push(k);
    var t = today(); var di = hs.days.indexOf(t);
    if (hs.done.length > 0 && di < 0) hs.days.push(t);
    if (hs.done.length === 0 && di >= 0) hs.days.splice(di, 1);
    hSave(hs); hRender();
  }
  hRender();

  show("index");
})();
</script>
</body>
</html>
