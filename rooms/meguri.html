<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>巡り辞典｜Be Grace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #fcfdfe;
    --ivory-deep: #eaf2f6;
    --ink: #2f2e2c;
    --ink-soft: #6c6a64;
    --ink-faint: #a6a29b;
    --gold: #3a96bf;
    --line: rgba(60, 56, 51, 0.10);
    --card: rgba(255, 255, 255, 0.6);
    --accent: #5aa8ca;       /* 巡り — 温いテラコッタ */
    --accent-deep: #3a8fb0;
    --accent-soft: rgba(192, 142, 114, 0.14);
    --shadow: 0 18px 50px -28px rgba(70, 60, 45, 0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fbfdff 0%, rgba(251,248,242,0) 55%),
      linear-gradient(180deg, var(--ivory) 0%, var(--ivory-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.9;
    letter-spacing: 0.04em;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 640px; margin: 0 auto; padding: 0 22px; }

  .top { padding: 26px 0 8px; }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 15px; letter-spacing: 0.12em; color: var(--ink-soft);
    text-decoration: none; transition: color .3s; background: none; border: none; cursor: pointer;
  }
  .back:hover { color: var(--ink); }

  .head { text-align: center; padding: 22px 0 6px; }
  .head__name { font-size: clamp(38px, 10vw, 56px); font-weight: 500; letter-spacing: 0.18em; }
  .head__copy { margin-top: 12px; font-size: 14px; letter-spacing: 0.20em; color: var(--ink-soft); }
  .head__line { width: 1px; height: 36px; margin: 16px auto 0;
    background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: .7; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    box-shadow: var(--shadow); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: clamp(26px, 6vw, 38px) clamp(22px, 5vw, 32px);
    margin: 22px 0;
  }
  .card__label {
    text-align: center; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 14px; letter-spacing: 0.28em; color: var(--accent-deep); text-transform: uppercase;
  }
  .card__ja { text-align: center; font-size: 13px; letter-spacing: 0.30em; color: var(--ink-faint); margin-top: 6px; }
  .lead { text-align: center; font-size: 14.5px; color: var(--ink-soft); letter-spacing: 0.08em; line-height: 2.0; }

  .controls { display: flex; justify-content: center; gap: 14px; margin-top: 24px; flex-wrap: wrap; }

  .is-hidden { display: none !important; }

  /* テーマ一覧 */
  .choices { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 26px; justify-content: center; }
  .choice {
    font-family: inherit; font-size: 14.5px; letter-spacing: 0.06em; color: var(--ink);
    background: #fff; border: 1px solid var(--line); border-radius: 18px;
    padding: 15px 24px; cursor: pointer; transition: all .3s;
    box-shadow: 0 10px 24px -12px rgba(70,110,130,0.40), 0 2px 6px -2px rgba(70,110,130,0.12);
  }
  .choice:hover { border-color: var(--accent); color: var(--accent-deep); background: #fff; transform: translateY(-2px); box-shadow: 0 12px 24px -10px var(--accent); }
  .choice.is-on { background: #fff; color: var(--accent-deep); border-color: var(--accent); box-shadow: 0 6px 16px -8px var(--accent); font-weight: 600; }
  #rhythmRow .choice:hover { border-color: #9fd0e0; color: #3a96bf; }
  #rhythmRow .choice.is-on { background: #fff; color: #3a96bf; border-color: #9fd0e0; box-shadow: 0 6px 16px rgba(58,150,191,0.16); font-weight: 600; }
  .choice.tapped, .choice.is-on, .choice:active { border-color: var(--accent) !important; color: var(--accent-deep) !important; background: #fff !important; transform: translateY(-2px) !important; box-shadow: 0 12px 24px -10px var(--accent) !important; font-weight: 600 !important; }
  .choice, .btn { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  @media (hover: none) {
    .choice:hover { border-color: var(--line); color: var(--ink); transform: none; box-shadow: 0 10px 24px -12px rgba(70,110,130,0.40), 0 2px 6px -2px rgba(70,110,130,0.12); }
    #rhythmRow .choice:hover { border-color: var(--line); color: var(--ink); }
  }

  /* ボタン */
  .btn {
    font-family: inherit; font-size: 15px; letter-spacing: 0.16em; cursor: pointer;
    border-radius: 999px; padding: 12px 28px; transition: all .3s; border: 1px solid var(--accent);
  }
  .btn--primary { background: var(--accent); color: #fff; }
  .btn--primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  #breathBtn { background: #3a96bf; border-color: #3a96bf; color: #fff; }
  #breathBtn:hover { background: #2f86ad; border-color: #2f86ad; }

  /* ひと呼吸ガイド */
  .breath-wrap { text-align: center; margin-top: 22px; }
  .breath-stage {
    width: 150px; height: 150px; border-radius: 50%; margin: 12px auto;
    background: radial-gradient(circle at 50% 40%, rgba(120,200,224,0.46), rgba(58,150,191,0.18));
    border: 1px solid rgba(58,150,191,0.18); box-shadow: 0 0 42px rgba(90,168,202,0.28);
    transform: scale(0.62); transition: transform 4s ease-in-out;
  }
  .breath-stage.inhale { transform: scale(1); transition-duration: 4s; }
  .breath-stage.exhale { transform: scale(0.62); transition-duration: 6s; }
  .breath-text { font-size: 15px; letter-spacing: 0.2em; color: #3a96bf; min-height: 22px; margin-top: 6px; }

  /* 巡りチェックの結果 */
  .check-result { text-align: center; }

  /* テーマ詳細 */
  .result__type { text-align: center; margin-bottom: 6px; }
  .result__crown { font-family: "Cormorant Garamond", serif; font-style: italic; letter-spacing: 0.2em;
    color: var(--accent-deep); font-size: 14px; text-transform: uppercase; }
  .result__name { font-size: clamp(28px, 7.5vw, 40px); font-weight: 500; letter-spacing: 0.10em; margin-top: 8px; }

  .block { margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--line); }
  .block:first-of-type { border-top: none; }
  .block__h { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
  .block__en { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 13px;
    letter-spacing: 0.16em; color: var(--accent-deep); text-transform: uppercase; flex: none; }
  .block__ja { font-size: 15px; letter-spacing: 0.10em; font-weight: 500; }
  .block p { font-size: 14.5px; letter-spacing: 0.04em; line-height: 1.95; color: var(--ink); }
  .block ul { list-style: none; margin-top: 6px; }
  .block li { position: relative; padding-left: 20px; margin-bottom: 10px; font-size: 14.5px; line-height: 1.85; }
  .block li::before { content: "—"; position: absolute; left: 0; color: var(--accent); }

  .grace { background: var(--accent-soft); border-radius: 8px; padding: 22px 20px; margin-top: 26px; }
  .grace p { font-size: 14.5px; line-height: 2.1; letter-spacing: 0.06em; text-align: center; }
  .tokarada { text-align: center; margin-top: 18px; }
  .tokarada a { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 14px;
    letter-spacing: 0.1em; color: var(--accent-deep); text-decoration: underline; text-underline-offset: 4px; }

  /* 関連コンテンツ（後から差し替え可能・今は空） */
  .links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .link-chip {
    display: inline-flex; align-items: center; gap: 8px; font-family: inherit; font-size: 13.5px;
    letter-spacing: 0.04em; color: var(--ink); background: rgba(255,255,255,0.6);
    border: 1px solid var(--line); border-radius: 999px; padding: 9px 16px; cursor: pointer;
    text-decoration: none; transition: all .3s;
  }
  .link-chip:hover { border-color: var(--accent); background: rgba(255,255,255,0.9); }
  .link-chip__kind { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 11px;
    letter-spacing: 0.1em; color: var(--accent-deep); }

  .foot { text-align: center; padding: 30px 0 56px; }
  .foot__title { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 20px; letter-spacing: 0.3em; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../index.html">← Be Grace</a>
    </div>

    <div class="head">
      <div class="head__name">巡り</div>
      <div class="head__copy">本来の流れを、取り戻す</div>
      <div class="head__line"></div>
    </div>

    <!-- ============ テーマ一覧 ============ -->
    <section id="viewIndex">
      <div class="card">
        <div class="card__label">Flow</div>
        <div class="card__ja">巡り辞典</div>
        <p class="lead" style="margin-top:20px">
          気になるテーマを、<br>ひとつ選んでください。<br>
          滞りをほどいて、本来の流れへ。
        </p>
        <div class="choices" id="themeChoices"></div>
      </div>

      <div class="card">
        <div class="card__label">Breath</div>
        <div class="card__ja">ひと呼吸</div>
        <p class="lead" style="margin-top:14px">輪に合わせて、ゆっくり呼吸を。</p>
        <div class="choices" id="rhythmRow" style="margin-top:14px"></div>
        <div class="breath-wrap">
          <div class="breath-stage" id="breathStage"></div>
          <div class="breath-text" id="breathText"></div>
        </div>
        <div class="controls"><button class="btn btn--primary" id="breathBtn">はじめる</button></div>
      </div>
    </section>

    <!-- ============ テーマ詳細 ============ -->
    <section id="viewTheme" class="is-hidden">
      <div class="card" id="themeCard"></div>
      <div class="controls"><button class="back" id="themeExit">← 辞典にもどる</button></div>
    </section>

    <div class="foot"><div class="foot__title">Be Grace</div></div>
  </div>

      begrace: "ひらめきは、ゆるんだ體に降りてきます。考えるより、まず體をゆるめて。"
    },
    goen: {
      sign: "巡りが滞ると、孤独感・気疲れ・人間関係の重たさが、出やすくなります。",
      body: "體がゆるんで余裕があるほど、人とのご縁もやわらかく巡ります。力みは、距離をつくります。",
      today: ["體をゆるめて、人と会う", "笑顔をひとつ", "「ありがとう」を伝える", "無理なつながりは手放す", "一人時間も大切に"],
      begrace: "ご縁も、巡るもの。自分が整うほど、心地よいつながりが流れ込みます。"
    },
    yutaka: {
      sign: "巡りがとどこおると、焦り・不足感・受け取れなさが、出やすくなります。",
      body: "豊かさは、受け取る器がゆるんでいるほど入ってきます。みぞおちや胸の力みは、流れをせき止めます。",
      today: ["みぞおち・胸をゆるめる", "深呼吸で、ひらく", "今あるものに「ありがとう」", "受け取りを、素直に", "余白の時間をつくる"],
      begrace: "豊かさも、巡るもの。ゆるんで受け取る體に、流れ込んできます。"
    },
    yorokobi: {
      sign: "喜びが滞ると、無感動・どんより・楽しめなさが、出やすくなります。",
      body: "喜びは、體が軽いほど湧いてきます。笑顔や好きなことは、巡りそのものを動かします。",
      today: ["嫌なことをやめる", "声を出して笑う", "體を動かす", "空を見上げる", "「やりたい」に、素直に従う"],
      begrace: "喜びは、巡りの源。體が軽くなるほど、心は自然にときめきます。"
    }
  };

  // iPhoneで「触れている間、色が出る(:active)」を効かせるためのおまじない
  document.addEventListener("touchstart", function () {}, { passive: true });

  // ===== 画面の切り替え =====
  function show(name) {
    if (name !== "index" && typeof stopBreath === "function") stopBreath();
    document.getElementById("viewIndex").classList.toggle("is-hidden", name !== "index");
    document.getElementById("viewTheme").classList.toggle("is-hidden", name !== "theme");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ===== リンク（おすすめコンテンツ枠） =====
  function parseMedia(raw) {
    var url = (raw || "").trim();
    if (!url) return null;
    if (/youtu\.?be/.test(url)) return { kind: "Movie", src: url };
    if (/vimeo\.com/.test(url)) return { kind: "Movie", src: url };
    if (/docs\.google\.com\/presentation/.test(url)) return { kind: "Slide", src: url };
    if (/docs\.google\.com|drive\.google\.com|forms\.gle/.test(url)) return { kind: "Doc", src: url };
    if (/\.(mp3|m4a|ogg|wav|aac)(\?.*)?$/i.test(url)) return { kind: "Sound", src: url };
    return { kind: "Link", src: url };
  }
  function renderLinks(themeKey) {
    var items = (LINKS[themeKey] || []).filter(function (it) { return it && it.url; });
    if (!items.length) return null;
    var wrap = document.createElement("div"); wrap.className = "links";
    items.forEach(function (it) {
      var info = parseMedia(it.url);
      var a = document.createElement("a"); a.className = "link-chip";
      a.href = info.src; a.target = "_blank"; a.rel = "noopener";
      var kind = document.createElement("span"); kind.className = "link-chip__kind"; kind.textContent = info.kind;
      var t = document.createElement("span"); t.textContent = it.title || "ひらく";
      a.appendChild(kind); a.appendChild(t);
      wrap.appendChild(a);
    });
    return wrap;
  }

  // ===== 描画 =====
  function block(en, ja, bodyNode) {
    var b = document.createElement("div"); b.className = "block";
    var h = document.createElement("div"); h.className = "block__h";
    var e = document.createElement("span"); e.className = "block__en"; e.textContent = en;
    var j = document.createElement("span"); j.className = "block__ja"; j.textContent = ja;
    h.appendChild(e); h.appendChild(j); b.appendChild(h); b.appendChild(bodyNode);
    return b;
  }
  function pEl(text) { var p = document.createElement("p"); p.textContent = text; return p; }
  function ulEl(arr) {
    var ul = document.createElement("ul");
    arr.forEach(function (x) { var li = document.createElement("li"); li.textContent = x; ul.appendChild(li); });
    return ul;
  }

  function renderTheme(themeKey) {
    var th = THEMES.filter(function (t) { return t.k === themeKey; })[0];
    var d = THEME_DATA[themeKey];
    var card = document.getElementById("themeCard");
    card.innerHTML = "";

    var head = document.createElement("div"); head.className = "result__type";
    head.innerHTML =
      '<div class="result__crown">Flow</div>' +
      '<div class="result__name">' + th.label + '</div>';
    card.appendChild(head);

    card.appendChild(block("Sign", "滞ると起こりやすいこと", pEl(d.sign)));
    card.appendChild(block("Body", "體とのつながり", pEl(d.body)));
    card.appendChild(block("Today", "今日できること", ulEl(d.today)));

    var bg = document.createElement("div"); bg.className = "grace";
    var bp = document.createElement("p"); bp.textContent = d.begrace;
    bg.appendChild(bp);
    card.appendChild(block("Be Grace", "巡りは、體から始まる", bg));

    var links = renderLinks(themeKey);
    if (links) card.appendChild(block("Next", "つながる場所", links));

    var tk = document.createElement("div"); tk.className = "tokarada";
    tk.innerHTML = '<a href="karada.html">→ 體のお部屋で、ととのえる</a>';
    card.appendChild(tk);
  }

  // ===== テーマ一覧の描画・遷移 =====
  var box = document.getElementById("themeChoices");
  var navigating = false;
  THEMES.forEach(function (t) {
    var b = document.createElement("button"); b.className = "choice"; b.textContent = t.label;
    b.addEventListener("click", function () {
      if (navigating) return;
      navigating = true;
      b.classList.add("tapped");   // 押したボタンにくっきり色をつける（ここ押した！）
      setTimeout(function () { renderTheme(t.k); show("theme"); navigating = false; b.classList.remove("tapped"); }, 150);
    });
    box.appendChild(b);
  });
  document.getElementById("themeExit").addEventListener("click", function () { show("index"); });

  // ===== ① ひと呼吸ガイド（リズムを選べる） =====
  var RHYTHMS = [
    { k: "calm",   label: "落ち着く 4-6",     inS: 4, holdS: 0, outS: 6 },
    { k: "gentle", label: "やさしい 4-4",     inS: 4, holdS: 0, outS: 4 },
    { k: "deep",   label: "深いリラックス 4-7-8", inS: 4, holdS: 7, outS: 8 }
  ];
  var curRhythm = RHYTHMS[0];
  var breathing = false, breathTimer = null;
  var bStage = document.getElementById("breathStage");
  var bText  = document.getElementById("breathText");
  var bBtn   = document.getElementById("breathBtn");
  var rhythmRow = document.getElementById("rhythmRow");

  function breathStep(phase) {
    if (!breathing) return;
    var r = curRhythm;
    if (phase === "in") {
      bText.textContent = "吸って…";
      bStage.style.transitionDuration = r.inS + "s"; bStage.style.transform = "scale(1)";
      breathTimer = setTimeout(function () { breathStep(r.holdS > 0 ? "hold" : "out"); }, r.inS * 1000 + 200);
    } else if (phase === "hold") {
      bText.textContent = "止めて…";
      bStage.style.transitionDuration = "0s";
      breathTimer = setTimeout(function () { breathStep("out"); }, r.holdS * 1000);
    } else {
      bText.textContent = "吐いて…";
      bStage.style.transitionDuration = r.outS + "s"; bStage.style.transform = "scale(0.62)";
      breathTimer = setTimeout(function () { breathStep("in"); }, r.outS * 1000 + 200);
    }
  }
  function startBreath() {
    breathing = true; bBtn.textContent = "とめる";
    // 最初の「吸って」も、ちゃんと"小さい→大きい"で始まるよう、まず小さく整えてから吸う
    bStage.style.transitionDuration = "0s"; bStage.style.transform = "scale(0.62)";
    requestAnimationFrame(function () { requestAnimationFrame(function () { if (breathing) breathStep("in"); }); });
  }
  function stopBreath() {
    breathing = false; if (breathTimer) clearTimeout(breathTimer);
    bBtn.textContent = "はじめる"; bText.textContent = "";
    bStage.style.transitionDuration = "1s"; bStage.style.transform = "scale(0.62)";
  }
  bBtn.addEventListener("click", function () { breathing ? stopBreath() : startBreath(); });

  RHYTHMS.forEach(function (r) {
    var b = document.createElement("button");
    b.className = "choice" + (r.k === curRhythm.k ? " is-on" : "");
    b.textContent = r.label;
    b.addEventListener("click", function () {
      curRhythm = r;
      [].forEach.call(rhythmRow.children, function (c) { c.classList.remove("is-on"); });
      b.classList.add("is-on");
      if (breathing) { stopBreath(); startBreath(); }
    });
    rhythmRow.appendChild(b);
  });

  show("index");
})();
</script>
</body>
</html>
