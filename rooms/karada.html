<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="apple-touch-icon" href="../apple-touch-icon-v10.png" />
<link rel="icon" href="../icon-192-v10.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Be Grace" />
<title>體｜Be Grace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #fcfdfe;
    --ivory-deep: #eaf2f6;
    --ink: #2f2e2c;
    --ink-soft: #6c6a64;
    --ink-faint: #a6a29b;
    --gold: #3a96bf;
    --line: rgba(60, 56, 51, 0.10);
    --card: rgba(255, 255, 255, 0.6);
    --accent: #d6919a;       /* 體 — 第1ルート・ふんわり赤 */
    --accent-deep: #b06b75;
    --shadow: 0 18px 50px -28px rgba(70, 60, 45, 0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fbfdff 0%, rgba(251,248,242,0) 55%),
      linear-gradient(180deg, var(--ivory) 0%, var(--ivory-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.9;
    letter-spacing: 0.04em;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 620px; margin: 0 auto; padding: 0 22px; }

  /* ヘッダー */
  .top { padding: 26px 0 8px; }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 15px; letter-spacing: 0.12em; color: var(--ink-soft);
    text-decoration: none; transition: color .3s;
  }
  .back:hover { color: var(--ink); }

  .head { text-align: center; padding: 26px 0 10px; }
  .head__name { font-size: clamp(40px, 11vw, 60px); font-weight: 500; letter-spacing: 0.18em; }
  .head__copy { margin-top: 10px; font-size: 14px; letter-spacing: 0.22em; color: var(--ink-soft); }
  .head__line { width: 1px; height: 40px; margin: 18px auto 0;
    background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: .7; }

  /* カード共通 */
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    box-shadow: var(--shadow); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: clamp(26px, 6vw, 40px) clamp(22px, 5vw, 34px);
    margin: 28px 0;
  }
  .card__label {
    text-align: center; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 14px; letter-spacing: 0.28em; color: var(--accent-deep); text-transform: uppercase;
  }
  .card__ja { text-align: center; font-size: 13px; letter-spacing: 0.34em; color: var(--ink-faint); margin-top: 6px; margin-bottom: 22px; }

  /* タイマー */
  .ring-wrap { position: relative; width: 240px; height: 240px; margin: 6px auto 4px; }
  .ring { transform: rotate(-90deg); }
  .ring__bg { fill: none; stroke: rgba(60,56,51,0.10); stroke-width: 6; }
  .ring__bar {
    fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset .35s linear;
  }
  .time {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time__num { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 58px; letter-spacing: 0.04em; color: var(--ink); line-height: 1; }
  .time__state { margin-top: 8px; font-size: 12px; letter-spacing: 0.3em; color: var(--ink-faint); min-height: 18px; }
  /* 終了の合図（見てわかる） */
  .time__state.is-done { font-size: 20px; letter-spacing: 0.16em; color: var(--accent-deep); animation: doneText 1.1s cubic-bezier(.2,.7,.2,1); }
  @keyframes doneText { from { opacity: 0; transform: scale(.5); } to { opacity: 1; transform: scale(1); } }
  .time__num.is-done { color: var(--accent-deep); transition: color .6s; }
  .card.is-done { animation: doneGlow 2.1s ease-in-out 3; }
  @keyframes doneGlow {
    0%,100% { box-shadow: var(--shadow); background: var(--card); }
    40% { box-shadow: 0 0 0 2px rgba(143,162,136,.55), 0 24px 60px -14px rgba(143,162,136,.8); background: rgba(143,162,136,.18); }
  }
  .ring__bar.is-done { stroke-width: 8; animation: ringPulse 2.1s ease-in-out 3; }
  @keyframes ringPulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* プリセット */
  .presets { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 22px 0 6px; }
  .preset {
    font-family: inherit; font-size: 14px; letter-spacing: 0.08em;
    color: var(--ink-soft); background: transparent;
    border: 1px solid var(--line); border-radius: 999px; padding: 8px 18px; cursor: pointer;
    transition: background .3s, color .3s, border-color .3s, box-shadow .3s;
    font-weight: 500;
  }
  .preset:hover { border-color: var(--accent); color: var(--ink); }
  .preset.is-active, .preset:active { background: #fff !important; color: var(--accent-deep) !important; border-color: var(--accent) !important; box-shadow: 0 6px 16px -8px var(--accent) !important; }
  .preset { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  /* 操作ボタン */
  .controls { display: flex; justify-content: center; gap: 14px; margin-top: 22px; }
  .btn {
    font-family: inherit; font-size: 15px; letter-spacing: 0.18em; cursor: pointer;
    border-radius: 999px; padding: 13px 30px; transition: all .3s; border: 1px solid var(--accent);
  }
  .btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn--primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .btn--ghost { background: transparent; color: var(--ink-soft); border-color: var(--line); }
  .btn--ghost:hover { border-color: var(--accent); color: var(--ink); }

  /* メトロノーム */
  .metro__dot-row { display: flex; justify-content: center; margin: 4px 0 18px; }
  .metro__dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(60,56,51,0.14); transition: transform .08s ease, background .08s ease;
  }
  .metro__dot.is-beat { background: var(--accent); transform: scale(1.7); }
  .metro__dot.is-on { background: var(--accent); box-shadow: 0 0 18px var(--accent); animation: breathe 3.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: .85; } 50% { transform: scale(1.35); opacity: 1; } }

  /* ===== 暗い運動モード（画面を真っ黒にして熱を減らす） ===== */
  .dark-toggle { position: fixed; right: 16px; bottom: 16px; z-index: 50;
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(32,42,50,.82); color: #fff; border: none; border-radius: 999px;
    padding: 11px 17px; font-size: 13px; font-family: inherit; cursor: pointer;
    box-shadow: 0 8px 22px -8px rgba(0,0,0,.45); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
  .dark-toggle:active { transform: translateY(1px); }
  .darkmode { position: fixed; inset: 0; z-index: 9999; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
  .darkmode.is-on { display: flex; }
  .darkmode .dm-time { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 46px; letter-spacing: .04em; color: #444c52; }
  .darkmode .dm-hint { margin-top: 24px; font-size: 12px; letter-spacing: .2em; color: #2c3236; }

  .bpm { text-align: center; }
  .bpm__num { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 56px; line-height: 1; color: var(--ink); }
  .bpm__unit { font-size: 12px; letter-spacing: 0.3em; color: var(--ink-faint); margin-top: 2px; }

  .bpm__adjust { display: flex; align-items: center; justify-content: center; gap: 18px; margin: 18px 0 6px; }
  .step {
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line);
    background: transparent; color: var(--ink-soft); font-size: 22px; cursor: pointer; transition: all .3s;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .step:hover { border-color: var(--accent); color: var(--ink); }

  .bpm__presets { display: flex; justify-content: center; gap: 10px; margin: 16px 0 6px; }

  /* メトロノーム音量 */
  .vol { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 14px 0 2px; }
  .vol__label { font-size: 11px; letter-spacing: 0.22em; color: var(--ink-soft); }
  .vol__slider { width: 200px; max-width: 60vw; accent-color: var(--accent); }

  /* 積み上げ記録 */
  .stats { display: flex; justify-content: center; align-items: flex-end; gap: clamp(10px, 3vw, 24px); margin: 6px 0 2px; flex-wrap: nowrap; }
  .stat { text-align: center; flex: 1 1 0; min-width: 0; }
  .stat__num { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: clamp(15px, 4.5vw, 28px); color: var(--ink); line-height: 1.15; white-space: nowrap; }
  .stat__label { margin-top: 8px; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.18em; white-space: nowrap; }
  .rec-msg { text-align: center; margin-top: 18px; font-size: 13px; letter-spacing: 0.16em; color: var(--accent-deep); min-height: 18px; }

  /* 音楽（各自のリンク） */
  .music-input {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--ink);
    background: rgba(255,255,255,0.65); border: 1px solid var(--line); border-radius: 10px;
    padding: 13px 16px; letter-spacing: 0.03em; text-align: center;
  }
  .music-input::placeholder { color: var(--ink-faint); }
  .music-input:focus { outline: none; border-color: var(--accent); }
  .embed { position: relative; width: 100%; padding-top: 56.25%; margin-top: 18px; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .music-audio { width: 100%; margin-top: 18px; }
  .hint { text-align: center; font-size: 12px; color: var(--ink-faint); margin-top: 14px; letter-spacing: 0.06em; line-height: 1.7; }

  /* 音楽の再生中は、メトロノーム/528Hzを「お休み」状態に */
  .muted-note { display: none; text-align: center; font-size: 12px; letter-spacing: 0.2em; color: var(--ink-faint); margin: -8px 0 16px; }
  .card.is-muted .muted-note { display: block; }
  .card.is-muted .metro__dot-row,
  .card.is-muted .bpm,
  .card.is-muted .bpm__adjust,
  .card.is-muted .bpm__presets,
  .card.is-muted .controls,
  .card.is-muted .music-input,
  .card.is-muted #musicPlayer { opacity: 0.35; pointer-events: none; filter: grayscale(0.3); transition: opacity .4s; }

  .foot { text-align: center; padding: 30px 0 56px; }
  .foot__title { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 20px; letter-spacing: 0.3em; color: var(--ink-soft); }

  @media (max-width: 400px) {
    .ring-wrap { width: 210px; height: 210px; }
    .time__num { font-size: 50px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="../index.html">← Be Grace</a>
    </div>

    <div class="head">
      <div class="head__name">體</div>
      <div class="head__copy">整える、リセット習慣</div>
      <div class="head__line"></div>
    </div>

    <!-- ===== タイマー ===== -->
    <section class="card" id="timerCard">
      <div class="card__label">Timer</div>
      <div class="card__ja">今日の運動・30分</div>

      <div class="ring-wrap">
        <svg class="ring" width="240" height="240" viewBox="0 0 240 240">
          <circle class="ring__bg"  cx="120" cy="120" r="110"></circle>
          <circle class="ring__bar" id="ringBar" cx="120" cy="120" r="110"></circle>
        </svg>
        <div class="time">
          <div class="time__num" id="timeNum">30:00</div>
          <div class="time__state" id="timeState"></div>
        </div>
      </div>

      <div class="presets" id="presets">
        <button class="preset" data-min="5">5分</button>
        <button class="preset" data-min="10">10分</button>
        <button class="preset" data-min="20">20分</button>
        <button class="preset is-active" data-min="30">30分</button>
      </div>

      <div class="controls">
        <button class="btn btn--primary" id="startBtn">スタート</button>
        <button class="btn btn--ghost" id="resetBtn">リセット</button>
      </div>
    </section>

    <!-- ===== 積み上げ記録 ===== -->
    <section class="card">
      <div class="card__label">Record</div>
      <div class="card__ja">積み上げ・続けた証</div>

      <div class="stats">
        <div class="stat"><div class="stat__num" id="recToday">0</div><div class="stat__label">今日（分）</div></div>
        <div class="stat"><div class="stat__num" id="recTotal">0分</div><div class="stat__label">これまで</div></div>
        <div class="stat"><div class="stat__num" id="recDays">0</div><div class="stat__label">続けた日数</div></div>
      </div>
      <div class="rec-msg" id="recMsg"></div>
    </section>

    <!-- ===== 528Hz 癒しの音 ===== -->
    <section class="card" id="toneCard">
      <div class="card__label">Healing Tone</div>
      <div class="card__ja">528Hz・癒しの響き</div>
      <div class="muted-note">♪ 音楽中はお休み</div>

      <div class="metro__dot-row"><div class="metro__dot" id="toneDot"></div></div>

      <div class="controls">
        <button class="btn btn--primary" id="toneBtn">スタート</button>
      </div>
    </section>

    <!-- ===== 音楽（各自のリンク） ===== -->
    <section class="card" id="musicCard">
      <div class="card__label">Music</div>
      <div class="card__ja">好きな音楽を流す（各自）</div>

      <input class="music-input" id="musicInput" type="text" inputmode="url"
             placeholder="YouTubeなどのリンクを貼る" />
      <div class="controls">
        <button class="btn btn--primary" id="musicSet">セット</button>
        <button class="btn btn--ghost" id="musicClear">消す</button>
      </div>
      <div id="musicPlayer"></div>
    </section>

    <!-- ===== メトロノーム ===== -->
    <section class="card" id="metroCard">
      <div class="card__label">Metronome</div>
      <div class="card__ja">リズムを刻む</div>

      <div class="metro__dot-row"><div class="metro__dot" id="metroDot"></div></div>

      <div class="bpm">
        <div class="bpm__num" id="bpmNum">128</div>
        <div class="bpm__unit">BPM</div>
      </div>

      <div class="bpm__adjust">
        <button class="step" id="bpmDown" aria-label="テンポを下げる">−</button>
        <button class="step" id="bpmUp" aria-label="テンポを上げる">＋</button>
      </div>

      <div class="bpm__presets" id="bpmPresets">
        <button class="preset is-active" data-bpm="128">128</button>
        <button class="preset" data-bpm="140">140</button>
      </div>

      <div class="vol">
        <label class="vol__label" for="metroVol">音量</label>
        <input type="range" id="metroVol" min="0" max="100" value="50" class="vol__slider" aria-label="メトロノームの音量">
      </div>

      <div class="controls">
        <button class="btn btn--primary" id="metroBtn">スタート</button>
      </div>
    </section>

    <!-- ===== バックアップ ===== -->
    <section class="card">
      <div class="card__label">Backup</div>
      <div class="card__ja">記録を おまもりにする</div>
      <p class="hint" style="margin:0 0 16px">記録は、この端末の中だけにあります。<br>ときどき書き出して、おまもりにしましょう🤍</p>
      <div class="controls">
        <button class="btn btn--ghost" id="bkExport">書き出す</button>
        <button class="btn btn--ghost" id="bkImport">戻す</button>
      </div>
    </section>

    <div class="foot"><div class="foot__title">Be Grace</div></div>
  </div>

  <!-- 暗い運動モード：ボタンと、真っ黒オーバーレイ -->
  <button class="dark-toggle" id="darkToggle" type="button">🌙 画面を暗くする</button>
  <div class="darkmode" id="darkMode">
    <div class="dm-time" id="dmTime"></div>
    <div class="dm-hint">タップで戻る</div>
  </div>

  <!-- iPhoneのサイレントスイッチを越えるための無音ループ（メディア扱いを固定） -->
  <audio id="silentLoop" loop playsinline preload="auto" style="display:none">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAESsAAABAAgAZGF0YQAAAAA=" type="audio/wav">
  </audio>

<script>
(function () {
  "use strict";

  // ===== 共通：音（Web Audio。ファイル不要・オフラインでも鳴る） =====
  var actx = null;
  var silentLoop = document.getElementById("silentLoop");
  var silentStarted = false;
  // iPhoneのサイレントスイッチに負けないよう、最初のタップで無音ループを再生開始
  function kickSilent() {
    if (silentStarted || !silentLoop) return;
    var p = silentLoop.play();
    if (p && p.then) p.then(function () { silentStarted = true; }).catch(function () {});
    else silentStarted = true;
  }
  function audio() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      try { actx = new AC(); } catch (e) { return null; }
      actx.onstatechange = function () { if (actx && actx.state === "suspended") actx.resume(); };
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden && actx && actx.state === "suspended") actx.resume();
      });
      document.addEventListener("touchstart", function () {
        if (actx && actx.state === "suspended") actx.resume();
      }, { passive: true });
    }
    if (actx.state === "suspended") { try { actx.resume(); } catch (e) {} }
    kickSilent();
    return actx;
  }
  // iPhoneに「このサイトのデータを長く保ってください」とお願い
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().catch(function () {});
  }

  // ===== 自動ロックを止める（Wake Lock）=====
  // 何かが動いている間だけ、画面を起こしておく
  var wakeLock = null;
  function tryWakeLock() {
    if (!("wakeLock" in navigator) || wakeLock) return;
    try {
      navigator.wakeLock.request("screen").then(function (lock) {
        wakeLock = lock;
        wakeLock.addEventListener("release", function () { wakeLock = null; });
      }).catch(function () {});
    } catch (e) {}
  }
  function releaseWakeLockIfIdle() {
    if (!wakeLock) return;
    // タイマー走行中・528Hz・メトロノームのどれも動いていなければ解放
    var anyRunning = (typeof running !== "undefined" && running) ||
                     (typeof toneOn  !== "undefined" && toneOn) ||
                     (typeof metroOn !== "undefined" && metroOn);
    if (!anyRunning) {
      try { wakeLock.release(); } catch (e) {}
      wakeLock = null;
    }
  }
  // 画面が戻ってきたとき、何か動いていれば取り直す
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) return;
    var anyRunning = (typeof running !== "undefined" && running) ||
                     (typeof toneOn  !== "undefined" && toneOn) ||
                     (typeof metroOn !== "undefined" && metroOn);
    if (anyRunning) tryWakeLock();
  });
  // クリスタルボウル — 高め基音で透き通る響き、長い余韻はそのまま
  function chime() {
    var ctx = audio(); if (!ctx) return;
    var t = ctx.currentTime;
    var fundamental = 528;  // 528Hz（DNA修復・ガラスのような透明感）
    // 基音 ＋ オクターブ倍音、 ほのかな高音で透き通り感
    var partials = [
      { ratio: 1.00, peak: 0.12, decay: 24.0 },   // 基音
      { ratio: 2.00, peak: 0.030, decay: 16.0 },  // 1オクターブ上（透明感）
      { ratio: 4.00, peak: 0.008, decay: 9.0 }    // ほのかな高音（きらめき）
    ];
    partials.forEach(function (p) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine";
      o.frequency.value = fundamental * p.ratio;
      // 2秒かけて ふわっと立ち上がり、 長く 開放的に消える
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(p.peak, t + 2.0);
      g.gain.exponentialRampToValueAtTime(0.0001, t + p.decay);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + p.decay + 0.1);
    });
  }
  // メトロノームのクリック（木のカチッに近い自然な音）
  var noiseBuf = null;
  function getNoise(ctx) {
    if (noiseBuf) return noiseBuf;
    var len = Math.floor(ctx.sampleRate * 0.05);
    noiseBuf = ctx.createBuffer(1, len, ctx.sampleRate);
    var d = noiseBuf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return noiseBuf;
  }
  // メトロノーム音量（0.0〜1.0）。スライダーで動かせる。
  var metroVol = 0.5;
  function metroPeak() { return 0.03 + metroVol * 0.45; }
  function click(time, accent) {
    var ctx = audio();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine";
    o.frequency.value = 1000;
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(metroPeak(), time + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
    o.connect(g).connect(ctx.destination);
    o.start(time); o.stop(time + 0.07);
  }

  // ===== タイマー =====
  var CIRC = 2 * Math.PI * 110;
  var ringBar = document.getElementById("ringBar");
  ringBar.style.strokeDasharray = CIRC;
  ringBar.style.strokeDashoffset = 0;

  var timeNum = document.getElementById("timeNum");
  var timeState = document.getElementById("timeState");
  var startBtn = document.getElementById("startBtn");
  var resetBtn = document.getElementById("resetBtn");
  var timerCard = document.getElementById("timerCard");

  function clearDoneCue() {
    timeState.classList.remove("is-done");
    timeNum.classList.remove("is-done");
    timerCard.classList.remove("is-done");
    ringBar.classList.remove("is-done");
    if (typeof resumeMediaUI === "function") resumeMediaUI();
  }
  function showDoneCue() {
    timeState.classList.add("is-done");
    timeNum.classList.add("is-done");
    timerCard.classList.add("is-done");
    ringBar.classList.add("is-done");
    ringBar.style.strokeDashoffset = 0;   // リングが緑で“完成”する
  }

  var totalSec = 30 * 60;
  var remain = totalSec;
  var running = false;
  var endAt = 0;     // 終了予定の時刻(ms)
  var tick = null;
  var segStart = remain;  // この運動区間を始めたときの残り秒

  function fmt(s) {
    var m = Math.floor(s / 60), ss = s % 60;
    return m + ":" + (ss < 10 ? "0" : "") + ss;
  }
  function render() {
    timeNum.textContent = fmt(remain);
    var ratio = totalSec === 0 ? 0 : remain / totalSec;
    ringBar.style.strokeDashoffset = CIRC * (1 - ratio);
    if (typeof dmTimeEl !== "undefined" && dmTimeEl) dmTimeEl.textContent = running ? fmt(remain) : "";
  }
  function setTotal(min) {
    stop();                       // 走っていれば、やった分を先に記録
    totalSec = min * 60; remain = totalSec; segStart = remain;
    clearDoneCue(); timeState.textContent = ""; render();
  }
  function update() {
    remain = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    render();
    if (remain <= 0) {
      stop();                                    // やった分を積み上げ
      // メトロノームと528Hzを止めて、YouTubeなどの音楽も一時停止して、静かな空間にチャイムを響かせる
      if (typeof metroOn !== "undefined" && metroOn) metroStop();
      if (typeof toneOn  !== "undefined" && toneOn)  toneStop();
      pauseMedia();
      if (typeof exitDark === "function") exitDark();   // 暗いモードを解除して、完了を見せる
      timeState.textContent = "整いました🤍";
      showDoneCue();                             // 見てわかる合図（リングと文字）
      // メディアセッションが切り替わる時間を稼いでから、チャイムをひびかせる
      setTimeout(function () { chime(); }, 900);
    }
  }
  function start() {
    if (running || remain <= 0) return;
    audio();
    running = true;
    segStart = remain;            // 区間の開始点を記録
    clearDoneCue();
    endAt = Date.now() + remain * 1000;
    startBtn.textContent = "一時停止";
    timeState.textContent = "運動中";
    tick = setInterval(update, 250);
    tryWakeLock();
  }
  function stop() {
    if (running) {                // 動いていた分だけ積み上げる
      var done = segStart - remain;
      if (done > 0) addSeconds(done);
      segStart = remain;
    }
    running = false;
    if (tick) { clearInterval(tick); tick = null; }
    startBtn.textContent = "スタート";
    releaseWakeLockIfIdle();
  }
  startBtn.addEventListener("click", function () {
    if (running) { stop(); timeState.textContent = "一時停止中"; }
    else { start(); }
  });
  resetBtn.addEventListener("click", function () {
    stop(); remain = totalSec; segStart = remain;
    clearDoneCue(); timeState.textContent = ""; render();
  });
  // iPhoneで「触れている間、色が出る(:active)」を効かせるためのおまじない
  document.addEventListener("touchstart", function () {}, { passive: true });

  document.getElementById("presets").addEventListener("click", function (e) {
    var b = e.target.closest(".preset"); if (!b) return;
    [].forEach.call(this.children, function (c) { c.classList.remove("is-active"); });
    b.classList.add("is-active");
    setTotal(parseInt(b.dataset.min, 10));
  });
  render();

  // ===== 積み上げ記録（この端末に保存） =====
  var LS = window.localStorage;
  var recToday = document.getElementById("recToday");
  var recTotal = document.getElementById("recTotal");
  var recDays  = document.getElementById("recDays");
  var recMsg   = document.getElementById("recMsg");

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }
  function hm(sec) {
    var m = Math.floor(sec / 60);
    if (m < 1) return "0分";
    if (m < 60) return m + "分";
    var h = Math.floor(m / 60), mm = m % 60;
    if (h < 100) return h + "時間" + (mm ? mm + "分" : "");
    return h + "時間";  // 100時間以上は時間だけ表示（「日数」と紛れないように）
  }
  var totalSecRec = parseInt(LS.getItem("bg_karada_total") || "0", 10);
  var daysArr = [];
  try { daysArr = JSON.parse(LS.getItem("bg_karada_days") || "[]"); } catch (e) { daysArr = []; }
  var todaySecRec = (LS.getItem("bg_karada_today_date") === todayStr())
    ? parseInt(LS.getItem("bg_karada_today_sec") || "0", 10) : 0;

  function renderRecord() {
    recToday.textContent = Math.floor(todaySecRec / 60);
    recTotal.textContent = hm(totalSecRec);
    recDays.textContent = daysArr.length;
    recMsg.textContent = totalSecRec > 0 ? "よく続けています🤍" : "";
  }
  function addSeconds(sec) {
    sec = Math.round(sec);
    if (sec <= 0) return;
    var t = todayStr();
    totalSecRec += sec; LS.setItem("bg_karada_total", totalSecRec);
    if (LS.getItem("bg_karada_today_date") !== t) {
      LS.setItem("bg_karada_today_date", t); todaySecRec = 0;
    }
    todaySecRec += sec; LS.setItem("bg_karada_today_sec", todaySecRec);
    if (daysArr.indexOf(t) < 0) { daysArr.push(t); LS.setItem("bg_karada_days", JSON.stringify(daysArr)); }
    renderRecord();
  }
  renderRecord();

  // ===== 音楽（各自のリンク・この端末に保存） =====
  var musicInput  = document.getElementById("musicInput");
  var musicPlayer = document.getElementById("musicPlayer");

  function parseMusic(raw) {
    var url = (raw || "").trim();
    if (!url) return null;
    var yt = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/|live\/))([\w-]{11})/);
    var list = url.match(/[?&]list=([\w-]+)/);
    if (yt || (list && /youtu\.?be/.test(url))) {
      // enablejsapi=1 を付けると、タイマー終了時にこちらから一時停止できる
      var src;
      if (yt && list) src = "https://www.youtube.com/embed/" + yt[1] + "?list=" + list[1] + "&enablejsapi=1";
      else if (yt)    src = "https://www.youtube.com/embed/" + yt[1] + "?enablejsapi=1";
      else            src = "https://www.youtube.com/embed/videoseries?list=" + list[1] + "&enablejsapi=1";
      return { type: "yt", src: src };
    }
    if (/\.(mp3|m4a|ogg|wav|aac)(\?.*)?$/i.test(url)) return { type: "audio", src: url };
    return { type: "unknown", src: url };
  }
  var musicCard = document.getElementById("musicCard");
  // タイマー終了時に流れている音楽を一時停止（YouTube・Vimeo・mp3 すべて対応）
  // 528Hzと同じく、Music カードも薄く（is-muted）して「お休み中」の見た目に
  function pauseMedia() {
    var iframe = musicPlayer.querySelector("iframe");
    if (iframe) {
      try {
        if (/youtube\.com|youtu\.be/.test(iframe.src)) {
          iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        } else if (/vimeo\.com/.test(iframe.src)) {
          iframe.contentWindow.postMessage('{"method":"pause"}', '*');
        }
      } catch (e) {}
    }
    var aud = musicPlayer.querySelector("audio");
    if (aud) { try { aud.pause(); } catch (e) {} }
    // 無音ループを再スタートしてメディアセッションをリフレッシュ
    if (silentLoop) {
      try {
        silentLoop.pause();
        silentLoop.currentTime = 0;
        var p = silentLoop.play();
        if (p && p.catch) p.catch(function () {});
      } catch (e) {}
    }
    // AudioContextが眠っていたら起こす
    try {
      var ctx = audio();
      if (ctx && ctx.state === "suspended") {
        var rp = ctx.resume();
        if (rp && rp.catch) rp.catch(function () {});
      }
    } catch (e) {}
    if (musicCard) musicCard.classList.add("is-muted");
  }
  function resumeMediaUI() {
    if (musicCard) musicCard.classList.remove("is-muted");
  }
  var toneCard = document.getElementById("toneCard");
  var metroCard = document.getElementById("metroCard");
  function enterMusicMode() {
    // YouTube などの音楽中は、528Hz と メトロノーム を どちらも お休み（薄く）にする
    if (typeof metroOn !== "undefined" && metroOn) metroStop();
    if (typeof toneOn !== "undefined" && toneOn) toneStop();
    toneCard.classList.add("is-muted");
    if (metroCard) metroCard.classList.add("is-muted");
  }
  function exitMusicMode() {
    toneCard.classList.remove("is-muted");
    if (metroCard) metroCard.classList.remove("is-muted");
  }

  function renderMusic(raw) {
    musicPlayer.innerHTML = "";
    var info = parseMusic(raw);
    if (!info) { exitMusicMode(); return; }
    if (info.type === "unknown") { /* 再生不可は通常表示のまま */ }
    else { enterMusicMode(); }
    if (info.type === "yt") {
      var box = document.createElement("div"); box.className = "embed";
      var f = document.createElement("iframe");
      f.src = info.src; f.loading = "lazy"; f.allowFullscreen = true;
      f.setAttribute("allow", "autoplay; encrypted-media; picture-in-picture");
      box.appendChild(f); musicPlayer.appendChild(box);
    } else if (info.type === "audio") {
      var a = document.createElement("audio");
      a.className = "music-audio"; a.controls = true; a.src = info.src;
      musicPlayer.appendChild(a);
    } else {
      var p = document.createElement("p"); p.className = "hint";
      p.textContent = "このリンクは再生できないかもしれません。YouTubeのリンク、または mp3 などの音声リンクを貼ってください。";
      musicPlayer.appendChild(p);
    }
  }
  document.getElementById("musicSet").addEventListener("click", function () {
    var v = musicInput.value.trim();
    if (!v) return;
    LS.setItem("bg_karada_music", v);
    renderMusic(v);
  });
  document.getElementById("musicClear").addEventListener("click", function () {
    LS.removeItem("bg_karada_music");
    musicInput.value = "";
    musicPlayer.innerHTML = "";
    exitMusicMode();
  });
  var savedMusic = LS.getItem("bg_karada_music");
  if (savedMusic) { musicInput.value = savedMusic; renderMusic(savedMusic); }

  // ===== 528Hz 癒しの音（純粋な正弦波・なめらかに出入り） =====
  var toneOn = false, toneOsc = null, toneGain = null;
  var toneBtn = document.getElementById("toneBtn");
  var toneDot = document.getElementById("toneDot");

  function toneStart() {
    var ctx = audio();
    toneGain = ctx.createGain();
    toneGain.gain.setValueAtTime(0.0001, ctx.currentTime);
    toneGain.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 1.6); // ふわっと立ち上げ（控えめ）
    toneOsc = ctx.createOscillator();
    toneOsc.type = "sine";
    toneOsc.frequency.value = 528;                                       // 正確に528Hz
    toneOsc.connect(toneGain).connect(ctx.destination);
    toneOsc.start();
    toneOn = true;
    toneBtn.textContent = "ストップ";
    toneBtn.classList.remove("btn--primary"); toneBtn.classList.add("btn--ghost");
    toneDot.classList.add("is-on");
    tryWakeLock();
  }
  function toneStop() {
    var ctx = audio();
    if (toneGain) {
      toneGain.gain.cancelScheduledValues(ctx.currentTime);
      toneGain.gain.setValueAtTime(toneGain.gain.value, ctx.currentTime);
      toneGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 0.7); // ふわっと消す
    }
    if (toneOsc) { toneOsc.stop(ctx.currentTime + 0.8); toneOsc = null; }
    toneOn = false;
    toneBtn.textContent = "スタート";
    toneBtn.classList.add("btn--primary"); toneBtn.classList.remove("btn--ghost");
    toneDot.classList.remove("is-on");
    releaseWakeLockIfIdle();
  }
  toneBtn.addEventListener("click", function () { toneOn ? toneStop() : toneStart(); });

  // ===== メトロノーム（光と音を分ける：音が眠っても光は確実に出る） =====
  var bpm = 128;
  var metroOn = false;
  var metroTimer = null;
  var bpmNum = document.getElementById("bpmNum");
  var metroBtn = document.getElementById("metroBtn");
  var metroDot = document.getElementById("metroDot");

  function flashDot() {
    metroDot.classList.add("is-beat");
    setTimeout(function () { metroDot.classList.remove("is-beat"); }, 90);
  }
  function metroTick() {
    if (!metroOn) return;
    flashDot();
    try {
      var ctx = audio();
      if (ctx && ctx.state === "running") click(ctx.currentTime + 0.001, false);
    } catch (e) {}
    metroTimer = setTimeout(metroTick, 60000 / bpm);
  }
  function metroStart() {
    if (metroOn) return;
    metroOn = true;
    try { audio(); } catch (e) {}
    metroBtn.textContent = "ストップ";
    metroBtn.classList.remove("btn--primary"); metroBtn.classList.add("btn--ghost");
    metroTick();
    tryWakeLock();
  }
  function metroStop() {
    metroOn = false;
    if (metroTimer) { clearTimeout(metroTimer); metroTimer = null; }
    metroBtn.textContent = "スタート";
    metroBtn.classList.add("btn--primary"); metroBtn.classList.remove("btn--ghost");
    releaseWakeLockIfIdle();
  }
  function setBpm(v) {
    bpm = Math.min(208, Math.max(40, v));
    bpmNum.textContent = bpm;
    [].forEach.call(document.querySelectorAll("#bpmPresets .preset"), function (c) {
      c.classList.toggle("is-active", parseInt(c.dataset.bpm, 10) === bpm);
    });
  }
  metroBtn.addEventListener("click", function () { metroOn ? metroStop() : metroStart(); });
  document.getElementById("bpmUp").addEventListener("click", function () { setBpm(bpm + 1); });
  document.getElementById("bpmDown").addEventListener("click", function () { setBpm(bpm - 1); });
  document.getElementById("bpmPresets").addEventListener("click", function (e) {
    var b = e.target.closest(".preset"); if (!b) return;
    setBpm(parseInt(b.dataset.bpm, 10));
  });
  setBpm(128);

  // メトロノーム音量スライダー（覚える）
  var savedMetroVol = LS.getItem("bg_karada_metro_vol");
  if (savedMetroVol != null) {
    var sv = parseFloat(savedMetroVol);
    if (!isNaN(sv)) metroVol = Math.min(1, Math.max(0, sv));
  }
  var metroVolEl = document.getElementById("metroVol");
  if (metroVolEl) {
    metroVolEl.value = String(Math.round(metroVol * 100));
    metroVolEl.addEventListener("input", function () {
      var v = parseInt(this.value, 10) / 100;
      metroVol = Math.min(1, Math.max(0, v));
      LS.setItem("bg_karada_metro_vol", String(metroVol));
    });
  }

  // ===== 暗い運動モード（画面を真っ黒にして熱を減らす・音はそのまま続く） =====
  var darkEl = document.getElementById("darkMode");
  var dmTimeEl = document.getElementById("dmTime");
  var darkToggle = document.getElementById("darkToggle");
  function enterDark() {
    if (!darkEl) return;
    if (dmTimeEl) dmTimeEl.textContent = (typeof running !== "undefined" && running) ? fmt(remain) : "";
    darkEl.classList.add("is-on");
  }
  function exitDark() {
    if (darkEl) darkEl.classList.remove("is-on");
  }
  if (darkToggle) darkToggle.addEventListener("click", enterDark);
  if (darkEl) darkEl.addEventListener("click", exitDark);

  // ===== バックアップ =====
  function todayFile() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function exportBackup() {
    var data = {
      app: "karada", v: 1, exportedAt: todayFile(),
      total: LS.getItem("bg_karada_total") || "0",
      today_date: LS.getItem("bg_karada_today_date") || "",
      today_sec: LS.getItem("bg_karada_today_sec") || "0",
      days: LS.getItem("bg_karada_days") || "[]",
      music: LS.getItem("bg_karada_music") || ""
    };
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "karada-backup-" + todayFile() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);}, 1500);
    alert("書き出しました🤍\nダウンロードの場所に、ファイルが入っています。\nクラウドやメールに送って、保管してくださいね。");
  }
  function importBackup() {
    var input = document.createElement("input");
    input.type = "file"; input.accept = ".json,application/json";
    input.onchange = function(e) {
      var f = e.target.files && e.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function() {
        try {
          var data = JSON.parse(r.result);
          if (!data || data.app !== "karada") {
            alert("このファイルは 體のおへやの バックアップではないようです。"); return;
          }
          if (!confirm("いまの記録は、ファイルの中身に 置きかえられます。\nよろしいですか？")) return;
          if (data.total != null) LS.setItem("bg_karada_total", data.total);
          if (data.today_date != null) LS.setItem("bg_karada_today_date", data.today_date);
          if (data.today_sec != null) LS.setItem("bg_karada_today_sec", data.today_sec);
          if (data.days != null) LS.setItem("bg_karada_days", data.days);
          if (data.music != null) LS.setItem("bg_karada_music", data.music);
          totalSecRec = parseInt(LS.getItem("bg_karada_total") || "0", 10);
          try { daysArr = JSON.parse(LS.getItem("bg_karada_days") || "[]"); } catch (e) { daysArr = []; }
          todaySecRec = (LS.getItem("bg_karada_today_date") === todayStr())
            ? parseInt(LS.getItem("bg_karada_today_sec") || "0", 10) : 0;
          renderRecord();
          var m = LS.getItem("bg_karada_music");
          if (m) { musicInput.value = m; renderMusic(m); } else { musicInput.value = ""; musicPlayer.innerHTML = ""; }
          alert("記録を もどしました🤍");
        } catch (err) { alert("ファイルを ひらけませんでした。"); }
      };
      r.readAsText(f);
    };
    input.click();
  }
  document.getElementById("bkExport").addEventListener("click", exportBackup);
  document.getElementById("bkImport").addEventListener("click", importBackup);
})();
</script>
</body>
</html>
