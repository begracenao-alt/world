  <head>

    <!-- 共有時（LINE / Instagram など）のプレビュー表示 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="今日の私診断 ─ Be Grace" />

      content="今日一日を、最高の未来に繋げる。1分でできる、今日のあなたの状態診断。"

    <meta property="og:locale" content="ja_JP" />

         <meta property="og:image" content="https://あなたのURL/ogp.png" /> -->

    <!-- タブ・ブックマークのアイコン（ゴールドのリング） -->

      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Ccircle%20cx='16'%20cy='16'%20r='9'%20fill='none'%20stroke='%23bd9c5e'%20stroke-width='2'/%3E%3C/svg%3E"

      rel="stylesheet"
    />
    <style>
/* ============================================================
   Be Grace ─ 今日の私診断
   リュクス・女性向け・余白を大切にしたトーン
   ============================================================ */

:root {
  --cream: #fdf8f7;
  --cream-deep: #fbf3f1;
  --ivory: #ffffff;
  --ink: #4a3d42;
  --ink-soft: #7a6a70;
  --gold: #c9a85f;
  --gold-deep: #b88a32;
  --gold-light: #f4e3b6;
  --rose: #e6a6b4;
  --rose-soft: #f6d2da;
  --rosegold: #e3b79e;
  --line: #f0dcd4;
  --radius: 26px;
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --shadow: 0 30px 60px -24px rgba(205, 165, 170, 0.30);
  --shadow-card: 0 26px 54px -24px rgba(205, 165, 170, 0.32), 0 4px 14px -8px rgba(205, 165, 170, 0.18);
  --shadow-soft: 0 16px 38px -22px rgba(205, 165, 170, 0.26);
  --shadow-btn: 0 16px 30px -10px rgba(220, 160, 170, 0.45);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  height: 100%;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  background:
    radial-gradient(150% 65% at 50% -14%, #ffffff 0%, var(--cream) 52%, var(--cream-deep) 100%) fixed;
  -webkit-font-smoothing: antialiased;
  line-height: 1.85;
  letter-spacing: 0.02em;
  font-weight: 300;
}

/* ごく薄い紙の質感（リュクスなマット感） */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.85'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3C/filter%3E%3Crect%20width='100%25'%20height='100%25'%20filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.05;
  mix-blend-mode: multiply;
}

.stage {
  max-width: 468px;
  margin: 0 auto;
  min-height: 100dvh;
  padding: 0 24px env(safe-area-inset-bottom);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

/* ---------- 画面の切り替え ---------- */
.screen {
  display: none;
  flex: 1;
  flex-direction: column;
  animation: fade 0.7s var(--ease);
}
.screen.is-active {
  display: flex;
}
@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(14px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

/* ---------- 共通パーツ ---------- */
.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  font-size: 13px;
  color: var(--gold-deep);
  text-indent: 0.42em;
}

.btn {
  font-family: inherit;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.14em;
  border: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 17px 34px;
  display: inline-block;
  text-align: center;
  text-decoration: none; /* <a>のボタンでも下線を出さず、余白を正しく効かせる */
  transition:
    transform 0.4s var(--ease),
    box-shadow 0.4s var(--ease),
    opacity 0.3s;
}
.btn--primary {
  background: linear-gradient(135deg, #e6a6b4 0%, #e3b79e 52%, #c9a85f 100%);
  color: #fffdf8;
  box-shadow: var(--shadow-btn), inset 0 1px 0 rgba(255, 255, 255, 0.38);
  text-shadow: 0 1px 1px rgba(120, 90, 40, 0.16);
}
.btn--primary:hover {
  transform: translateY(-2px);
  box-shadow:
    0 22px 36px -10px rgba(168, 134, 63, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.42);
}
.btn--primary:active {
  transform: translateY(0);
}
.btn--primary:disabled {
  opacity: 0.35;
  cursor: default;
  box-shadow: none;
  transform: none;
}
.btn--ghost {
  background: transparent;
  color: var(--gold-deep);
  border: 1px solid var(--line);
}
/* やわらかいお誘い用（売り込み感を出さない） */
.btn--soft {
  background: linear-gradient(180deg, #fffefb, #f6ecda);
  color: var(--gold-deep);
  border: 1px solid var(--gold);
  box-shadow: 0 8px 20px -12px rgba(168, 134, 63, 0.32);
}
.btn--soft:hover {
  transform: translateY(-2px);
  background: linear-gradient(180deg, #fffefb, #f1e4cb);
  box-shadow: 0 14px 26px -12px rgba(168, 134, 63, 0.4);
}

/* ============================================================
   玄関（ウェルカム）
   ============================================================ */
.screen--welcome {
  justify-content: center;
  text-align: center;
}
.welcome-inner {
  padding: 40px 6px 70px;
  position: relative;
}
/* 玄関の、やわらかな光 */
.welcome-inner::before {
  content: '';
  position: absolute;
  top: 4%;
  left: 50%;
  width: 340px;
  height: 340px;
  max-width: 92vw;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(226, 207, 159, 0.4), transparent 66%);
  z-index: -1;
  pointer-events: none;
}
.hero-title {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: clamp(27px, 8.2vw, 35px);
  letter-spacing: 0.08em;
  margin: 18px 0 14px;
  line-height: 1.6;
}
.hero-sub {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-weight: 400;
  color: var(--gold-deep);
  letter-spacing: 0.22em;
  font-size: 18px;
  position: relative;
  padding: 0 26px;
  margin-top: 4px;
}
.hero-sub::before,
.hero-sub::after {
  content: '';
  position: absolute;
  top: 52%;
  width: 16px;
  height: 1px;
  background: var(--gold);
  opacity: 0.75;
}
.hero-sub::before {
  left: 0;
}
.hero-sub::after {
  right: 0;
}
.hero-ornament {
  color: var(--gold);
  font-size: 22px;
  margin: 36px 0;
  letter-spacing: 0.3em;
}
.hero-lead {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 18px;
  line-height: 2.2;
  margin-bottom: 46px;
}
.hero-note {
  margin-top: 22px;
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--ink-soft);
}

/* ============================================================
   クイズ
   ============================================================ */
.quiz-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 26px 2px 8px;
}
.back {
  background: none;
  border: none;
  font-size: 28px;
  line-height: 1;
  color: var(--gold-deep);
  cursor: pointer;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  transition: background 0.3s;
}
.back:hover {
  background: rgba(189, 156, 94, 0.1);
}
.quiz-head__spacer {
  width: 40px;
}
.progress {
  display: flex;
  gap: 10px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--line);
  transition: all 0.5s var(--ease);
}
.dot.is-on {
  background: var(--gold);
  transform: scale(1.25);
}

.step {
  display: none;
  flex: 1;
  flex-direction: column;
  padding: 18px 2px 40px;
  animation: fade 0.6s var(--ease);
}
.step.is-active {
  display: flex;
}
.step-no {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.step-title {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: clamp(16px, 4.8vw, 19px);
  line-height: 1.6;
  margin: 8px 0 10px;
  white-space: nowrap; /* 見出しは1行に収める */
}
.step-hint {
  color: var(--ink-soft);
  font-size: 14px;
  margin-bottom: 30px;
}
.optional-tag {
  display: inline-block;
  vertical-align: middle;
  margin-left: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--gold-deep);
  background: rgba(189, 156, 94, 0.12);
  border-radius: 999px;
  padding: 3px 12px;
}
.step-hint b {
  color: var(--gold-deep);
  font-weight: 500;
}

.field-birth {
  display: flex;
  gap: 10px;
}
.field-select {
  flex: 1;
  min-width: 0;
  font-family: inherit;
  font-size: 16px;
  color: var(--ink);
  background-color: var(--ivory);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 17px 28px 17px 12px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-align: center;
  text-align-last: center;
  appearance: none;
  -webkit-appearance: none;
  /* 金色の下向き矢印（押せる印） */
  background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='12'%20height='8'%20viewBox='0%200%2012%208'%3E%3Cpath%20d='M1%201l5%205%205-5'%20fill='none'%20stroke='%23bd9c5e'%20stroke-width='1.6'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 11px center;
}
.field-select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(189, 156, 94, 0.12);
}

/* 生まれた日を選ぶと現れる、その場プレビュー */
.birth-preview {
  margin-top: 22px;
  margin-bottom: auto;
  text-align: center;
  padding: 24px 22px 22px;
  background: linear-gradient(135deg, #faf4e9, #f5ead6);
  border-radius: 22px;
  animation: rise 0.6s var(--ease);
}
.birth-preview .rhythm-name {
  font-size: 21px;
  margin-top: 8px;
}
.birth-preview .rhythm-reading {
  font-size: 14px;
}
.birth-preview__caption {
  margin-top: 16px;
  font-size: 11px;
  line-height: 1.8;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
}

/* 選択肢 */
.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 11px;
  margin-bottom: auto;
}
.choices--gender {
  flex-direction: column;
}
.chip {
  font-family: inherit;
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  background: linear-gradient(180deg, #fffdf9, var(--ivory));
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 13px 20px;
  cursor: pointer;
  transition: all 0.35s var(--ease);
  letter-spacing: 0.05em;
  box-shadow: 0 2px 6px -3px rgba(150, 122, 80, 0.12);
}
.chip--lg {
  padding: 18px 22px;
  text-align: left;
  font-size: 16px;
}
.chip:hover {
  border-color: var(--gold);
  transform: translateY(-1px);
}
.chip.is-on {
  background: linear-gradient(135deg, #e3c477, var(--gold-deep));
  color: #fffdf8;
  border-color: transparent;
  box-shadow:
    0 10px 20px -6px rgba(168, 134, 63, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.32);
}
/* tone でほのかに色味を分ける */
.chip[data-tone='shine'].is-on {
  background: linear-gradient(135deg, #e3c477, #c9a85f);
}
.chip.is-disabled {
  opacity: 0.4;
  pointer-events: none;
}

.select-count {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--gold-deep);
  letter-spacing: 0.1em;
  margin: 24px 0 18px;
}

.step .btn {
  margin-top: 26px;
  width: 100%;
}

/* ============================================================
   診断中
   ============================================================ */
.screen--loading {
  justify-content: center;
  align-items: center;
  text-align: center;
}
.loader {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}
.loader span {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--gold);
  animation: breathe 1.4s var(--ease) infinite;
}
.loader span:nth-child(2) {
  animation-delay: 0.2s;
}
.loader span:nth-child(3) {
  animation-delay: 0.4s;
}
@keyframes breathe {
  0%,
  100% {
    transform: scale(0.6);
    opacity: 0.4;
  }
  50% {
    transform: scale(1);
    opacity: 1;
  }
}
.loading-text {
  font-family: 'Noto Serif JP', serif;
  color: var(--ink-soft);
  letter-spacing: 0.14em;
}

/* ============================================================
   結果
   ============================================================ */
.screen--result {
  padding-bottom: 50px;
}
.result-inner {
  padding-top: 34px;
}
.result-eyebrow {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.4em;
  font-size: 12px;
  color: var(--gold-deep);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.result-personal {
  text-align: center;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 22px;
  letter-spacing: 0.06em;
}

/* 結果ヘッダーカード */
.result-card {
  background: linear-gradient(170deg, #fffdf9, var(--ivory));
  border-radius: var(--radius);
  padding: 46px 30px 40px;
  text-align: center;
  box-shadow: var(--shadow-card);
  border: 1px solid rgba(255, 255, 255, 0.8);
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(
    90deg,
    transparent,
    var(--type-accent, var(--gold)) 22%,
    var(--type-accent, var(--gold)) 78%,
    transparent
  );
}
.result-symbol {
  font-size: 40px;
  color: var(--type-accent, var(--gold));
  line-height: 1;
}
.result-type {
  font-family: 'Noto Serif JP', serif;
  font-weight: 600;
  font-size: clamp(21px, 6.4vw, 29px);
  letter-spacing: 0.03em;
  margin: 16px 0 12px;
  white-space: nowrap; /* 「エネルギー充電タイプ」等の長い名前も1行に収める */
}
.result-tagline {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.9;
}

/* 今日のあなたのリズム（生年月日 × 今日の日付） */
.result-rhythm {
  margin-top: 22px;
  text-align: center;
  padding: 24px 22px 26px;
  background: rgba(255, 255, 255, 0.4);
  border: 1px solid var(--line);
  border-radius: 22px;
  opacity: 0;
  transform: translateY(16px);
  animation: rise 0.7s var(--ease) forwards;
}
.rhythm-label {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.18em;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 14px;
}
.rhythm-name {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: 22px;
  letter-spacing: 0.1em;
  color: var(--gold-deep);
  position: relative;
  display: inline-block;
  padding: 0 24px;
}
.rhythm-name::before,
.rhythm-name::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 16px;
  height: 1px;
  background: var(--gold);
  opacity: 0.6;
}
.rhythm-name::before {
  left: -6px;
}
.rhythm-name::after {
  right: -6px;
}
.rhythm-reading {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 14.5px;
  line-height: 2.05;
  color: var(--ink);
  margin-top: 14px;
  text-align: left;
}

/* 結果のセクション群 */
.result-block {
  margin-top: 26px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 26px 26px 28px;
  opacity: 0;
  transform: translateY(16px);
  animation: rise 0.7s var(--ease) forwards;
}
@keyframes rise {
  to {
    opacity: 1;
    transform: none;
  }
}
.block-label {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.16em;
  font-size: 13px;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 14px;
}
.block-label::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--gold);
}
.block-jp {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: 17px;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
}
.block-body {
  font-size: 15px;
  line-height: 2.1;
  color: var(--ink);
}

/* 今日の状態ブロックは、他の結果と同じく中央ぞろえに */
.result-block--today {
  text-align: center;
}
.result-block--today .block-label {
  justify-content: center;
}
/* 読み応えのある本文（お見受け文・アドバイス）は、読みやすく左ぞろえに */
.result-block--today .block-body {
  text-align: left;
}

/* 今日の判定（進みやすい日 / 整えながら進む日） */
.verdict {
  font-family: 'Noto Serif JP', serif;
  font-weight: 500;
  font-size: clamp(19px, 5.4vw, 22px);
  color: var(--gold-deep);
  text-align: center;
  letter-spacing: 0.04em;
  line-height: 1.7;
  margin-bottom: 18px;
}

/* タイプ統計（これまでのタイプ別の回数） */
.type-stats { margin-top: 18px; text-align: left; }
.type-stats__row { margin: 12px 0; }
.type-stats__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; gap: 10px; }
.type-stats__name { font-size: 13px; color: var(--ink); letter-spacing: 0.03em; }
.type-stats__num { flex: 0 0 auto; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.04em; }
.type-stats__bar { display: block; height: 6px; border-radius: 999px; background: var(--line); overflow: hidden; }
.type-stats__fill { display: block; height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--gold-light), var(--gold-deep)); }
.type-stats__round { text-align: center; font-size: 12px; color: var(--gold-deep);
  letter-spacing: 0.08em; margin: -8px 0 14px; }
.type-stats__note { text-align: center; font-size: 12px; color: var(--ink-soft);
  letter-spacing: 0.04em; margin-top: 16px; line-height: 1.7; }

/* アファメーション（特別なトーン） */
.result-block--affirm {
  background: #ffffff;
  border-color: var(--line);
  text-align: center;
}
/* アファメーション3つ：1行ずつ、やさしい区切り線で */
.result-block--affirm .block-jp {
  margin-bottom: 16px;
}
.affirm-line {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: clamp(15px, 4.2vw, 17px);
  line-height: 2;
  padding: 12px 4px;
}
.affirm-line + .affirm-line {
  border-top: 1px solid rgba(189, 156, 94, 0.2);

.door-line,

.hero-lead {

.hero-lead,
.step-title {

}

/*
 * Be Grace メッセージ
 * 診断タイプの messages 束から、毎回ランダムで1つ返す（来るたび違う言葉に出会える）。
 */
function beGraceMessage(type) {
  const list = (type && type.messages) || [];
  if (!list.length) return '';
  return list[Math.floor(Math.random() * list.length)];
}

function digitsSum(s) {
  return String(s)
    .replace(/\D/g, '')
    .split('')
    .reduce((a, c) => a + Number(c), 0);
}

function digitalRoot(n) {
  while (n > 9) n = digitsSum(n);
  return n;
}

/*
 * birthdate: 'YYYY-MM-DD' 等（記号は無視して数字だけ使う）
 * 生年月日"だけ"から「生まれ持ったリズム」を返す（固定）。未入力なら null。
 */
function bornRhythm(birthdate) {
  if (!birthdate) return null;
  const root = digitalRoot(digitsSum(birthdate)) || 9;
  return RHYTHMS[root - 1];
}

/*
 * 診断ロジック
 * selectedIds: 選ばれた FEELINGS の id（3つ想定）
 * 戻り値: { type, mood, scores }
 *   type : 3つのタグで一番多い7タイプ（同点はやさしい優先順）
 *   mood : 'beautiful'（進みやすい日）/ 'suffering'（整えながら進む日）
 *          ＝3つのうち多い方。同数や suffering 多数なら suffering（"整える"を大切にする）
 */
function diagnose(selectedIds) {
  const picks = selectedIds.map((id) => FEELINGS.find((x) => x.id === id)).filter(Boolean);

  // まず判定（mood）：beautiful（進む）と suffering（整える）の多い方
  let beautiful = 0;
  let suffering = 0;
  picks.forEach((f) => (f.mood === 'beautiful' ? (beautiful += 1) : (suffering += 1)));
  const mood = beautiful > suffering ? 'beautiful' : 'suffering';

  // タイプは「判定(mood)に合う選択肢」の中だけで多数決する。
  // → 「疲れてる・モヤモヤ（整える）なのにチャレンジ日和（進む）」のような
  //    判定とタイプの食い違いを防ぐ。同数はやさしい優先順（priority 昇順）。
  const pool = picks.filter((f) => f.mood === mood);
  const scores = {};
  Object.keys(TYPES).forEach((k) => (scores[k] = 0));
  pool.forEach((f) => (scores[f.type] += 1));

  let best = null;
  Object.values(TYPES).forEach((type) => {
    const s = scores[type.id];
    if (
      best === null ||
      s > scores[best.id] ||
      (s === scores[best.id] && type.priority < best.priority)
    ) {
      best = type;
    }
  });

  return { type: best, mood, scores };
}

        '<p class="verdict" style="margin-top:26px">この14日間の傾向</p>' +
        '<p class="type-stats__round">' + round + '回目の節目🤍</p>' +
        (tendency ? '<p class="block-body">' + tendency + '</p>' : '') +
        stats +
        '<p class="type-stats__note">くらべるものではなく、今のあなたを知るヒントに🤍</p>';
    }

    return (
      '<div class="result-block" style="animation-delay:.3s">' +
        '<span class="block-label">Your Journey</span>' +
        '<p class="verdict">これまでの積み上げ</p>' +
        '<p class="block-body">' + dayLine + '</p>' +
        trend +
      '</div>'
    );
  }

  function showLocked() {
    const cta = document.getElementById('lockedCta');
    if (cfg.summary) {
      // 30日モード：最後に「あなたの30日まとめ」＋「次のご案内」ボタンを出す
      document.getElementById('lockedLead').innerHTML = buildSummaryHtml();
      if (cfg.ctaLabel) {
        cta.textContent = cfg.ctaLabel;
        cta.href = cfg.ctaUrl;
        cta.style.display = '';
      } else {
        cta.style.display = 'none';
      }
      show('locked');
      return;
    }
    document.getElementById('lockedLead').innerHTML = cfg.lockLead || '';
    if (cfg.ctaLabel) {
      cta.textContent = cfg.ctaLabel;
      cta.href = cfg.ctaUrl;
      cta.style.display = '';
    } else {
      cta.style.display = 'none';
    }
    show('locked');
  }

  /* ---------- 状態 ---------- */
  const state = {
    birthdate: '',
    feelings: [], // 選ばれた feeling id（最大3）
    step: 0,
  };

  /* ---------- DOM ---------- */
  const screens = {};
  document.querySelectorAll('.screen').forEach((el) => {
    screens[el.dataset.screen] = el;
  });
  const stepEls = Array.from(document.querySelectorAll('.step'));
  const dots = Array.from(document.querySelectorAll('.dot'));
  const feelingsWrap = document.getElementById('feelings');
  const selectCount = document.getElementById('selectCount');

  /* ---------- 画面切替 ---------- */
  function show(name) {
    Object.values(screens).forEach((s) => s.classList.remove('is-active'));
    screens[name].classList.add('is-active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showStep(i) {
    state.step = i;
    stepEls.forEach((el) => el.classList.toggle('is-active', Number(el.dataset.step) === i));
    dots.forEach((d) => d.classList.toggle('is-on', Number(d.dataset.step) <= i));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ---------- 体調チップ生成 ---------- */
  function buildFeelings() {
    feelingsWrap.innerHTML = '';
    FEELINGS.forEach((f) => {
      const b = document.createElement('button');
      b.className = 'chip';
      b.type = 'button';
      b.textContent = f.label;
      b.dataset.id = f.id;
      b.dataset.tone = f.mood === 'beautiful' ? 'shine' : 'rest';
      b.setAttribute('aria-pressed', 'false');
      b.addEventListener('click', () => toggleFeeling(f.id, b));
      feelingsWrap.appendChild(b);
    });
  }

  function toggleFeeling(id, btn) {
    const i = state.feelings.indexOf(id);
    if (i >= 0) {
      state.feelings.splice(i, 1);
      btn.classList.remove('is-on');
      btn.setAttribute('aria-pressed', 'false');
    } else {
      if (state.feelings.length >= 3) return;
      state.feelings.push(id);
      btn.classList.add('is-on');
      btn.setAttribute('aria-pressed', 'true');
    }
    updateFeelingUI();
  }

  function updateFeelingUI() {
    const n = state.feelings.length;
    selectCount.textContent = `${n} / 3`;
    const full = n >= 3;
    feelingsWrap.querySelectorAll('.chip').forEach((c) => {
      const on = c.classList.contains('is-on');
      c.classList.toggle('is-disabled', full && !on);
    });
    const submit = document.querySelector('.step[data-step="1"] .btn');
    submit.disabled = n !== 3;
  }

  /* ---------- 生年月日（年・月・日のプルダウン。任意） ---------- */
  const birthY = document.getElementById('birthYear');
  const birthM = document.getElementById('birthMonth');
  const birthD = document.getElementById('birthDay');
  const birthPreview = document.getElementById('birthPreview');

  /* プルダウンの選択肢を用意（先頭は「年/月/日」の見出し） */
  (function buildBirthSelects() {
    const opt = (val, label) => `<option value="${val}">${label}</option>`;
    const thisYear = new Date().getFullYear();
    let y = opt('', '年');
    for (let v = thisYear; v >= 1940; v--) y += opt(v, `${v}年`);
    let m = opt('', '月');
    for (let v = 1; v <= 12; v++) m += opt(v, `${v}月`);
    let d = opt('', '日');
    for (let v = 1; v <= 31; v++) d += opt(v, `${v}日`);
    birthY.innerHTML = y;
    birthM.innerHTML = m;
    birthD.innerHTML = d;
  })();

  /* 3つ揃ったら 'YYYY-MM-DD'、揃わなければ '' を返す */
  function currentBirthdate() {
    const y = birthY.value, m = birthM.value, d = birthD.value;
    if (!y || !m || !d) return '';
    const pad = (n) => String(n).padStart(2, '0');
    return `${y}-${pad(m)}-${pad(d)}`;
  }

  function updateBirthPreview() {
    const v = currentBirthdate();
    const r = v ? bornRhythm(v) : null;
    if (!r) {
      birthPreview.hidden = true;
      return;
    }
    birthPreview.querySelector('.rhythm-name').innerHTML = `${r.symbol}&ensp;${r.name}`;
    birthPreview.querySelector('.rhythm-reading').textContent = r.reading;
    birthPreview.hidden = false;
  }
  [birthY, birthM, birthD].forEach((el) => el.addEventListener('change', updateBirthPreview));

  /* ---------- 進む / 戻る ---------- */
  function next(from) {
    if (from === 0) {
      // 生年月日は任意。3つ揃えた人だけ「生まれ持ったあなたのリズム」が届く
      state.birthdate = currentBirthdate();
      showStep(1);
    } else if (from === 1) {
      if (state.feelings.length !== 3) return;
      runDiagnosis();
    }
  }

  function back() {
    if (state.step === 0) {
      show('welcome');
    } else {
      showStep(state.step - 1);
    }
  }

  /* ---------- 診断実行 ---------- */
  function runDiagnosis() {
    show('loading');
    setTimeout(() => {
      const { type, mood } = diagnose(state.feelings);
      recordUse(); // 1日/30日モードの鍵（開始日・回数を記録）
      logResult(type, mood); // 30日まとめ用に、その日の結果を記録
      renderResult(type, mood);
      show('result');
    }, 1700);
  }

  /* 誕生日が近いとき（前後7日以内）のやさしい一言 */
  function birthdayNote() {
    if (!state.birthdate) return '';
    const [, m, d] = state.birthdate.split('-').map(Number);
    const today = new Date();
    const thisYear = new Date(today.getFullYear(), m - 1, d);
    const diff = Math.round((thisYear - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / 86400000);
    if (Math.abs(diff) <= 7) {
      return 'お誕生日のころですね。あなたが生まれてくれて、ありがとう。';
    }
    return '';
  }

  /* 選んだ言葉を「・」でつなぐ */
  function selectedLabels() {
    return state.feelings
      .map((id) => (FEELINGS.find((f) => f.id === id) || {}).label)
      .filter(Boolean)
      .join('・');
  }

  /* 改行を「、。！？の後ろ」だけに限定して、1文字ぼっち改行を防ぐ。
     CSSの word-break:keep-all と組で使う。
     句読点が1つも無い長文は、真ん中に改行候補を入れて"半分ずつ"に割る。 */
  /* 短い・中央ぞろえの言葉用：句読点(、。！？)の後ろに改行候補(<wbr>)を入れ、
     区切りの無い長い区間は真ん中で割る。CSSの word-break:keep-all と組で、
     1文字ぼっち改行を防ぎ、行を"半分ずつ"気持ちよく折り返す。
     （読み応えの本文には使わない＝そちらは自然な禁則処理に任せる） */
  function phr(s) {
    s = String(s);
    let result = '';
    let run = '';
    const flush = () => {
      const chars = [...run];
      if (chars.length > 13) {
        const mid = Math.ceil(chars.length / 2);
        result += chars.slice(0, mid).join('') + '<wbr>' + chars.slice(mid).join('');
      } else {
        result += run;
      }
      run = '';
    };
    for (const ch of s) {
      if (ch === '、' || ch === '。' || ch === '！' || ch === '？') {
        flush();
        result += ch + '<wbr>';
      } else if (ch === '\n') {
        flush();
        result += '\n';
      } else {
        run += ch;
      }
    }
    flush();
    return result;
  }

  function renderResult(type, mood) {
    const root = document.getElementById('resultInner');
    document.documentElement.style.setProperty('--type-accent', type.accent);

    const bday = birthdayNote();
    // 気づき＆アドバイスは"読み応えの本文"なので、自然な改行（禁則処理）に任せる（phrを通さない）
    const awareness = `あなたが選んだ「${selectedLabels()}」から、今日は『${type.name}』とお見受けしました。`;
    const verdictLabel = mood === 'beautiful' ? '今日は進みやすい日' : '今日は整えながら進む日';
    const advList = type.advices || [];
    const advice = advList.length ? advList[Math.floor(Math.random() * advList.length)] : '';

    const rhythm = bornRhythm(state.birthdate);
    const message = phr(beGraceMessage(type)).replace(/\n/g, '<br>');
    // アファメーションは3つの中から毎回ランダムで1つ
    const affList = type.affirmations || [];
    const affirmation = affList.length
      ? phr(affList[Math.floor(Math.random() * affList.length)])
      : '';

    // 締めの誘い：モードで出し分け（無期限は売り込みなし）
    const doorLine = `<p class="door-line">${phr('毎日の小さな選択が、未来を作る。今日のあなたが、どんな状態でも大丈夫。')}</p>`;
    const doorInvite =
      mode === 'member' || mode === 'trial30'
        ? '<p class="door-invite">また明日も、整えにきてくださいね🤍</p>'
        : `<p class="door-invite">${phr(cfg.inviteLead)}</p>
           <a class="btn btn--soft door-cta" href="${cfg.ctaUrl}" target="_blank" rel="noopener">${cfg.ctaLabel}</a>`;
    const doorHtml = `<div class="result-door"><div class="door-mark">❀</div>${doorLine}${doorInvite}</div>`;

    // もう一度：どのモードでも、その日のうちは何度でも診断できる（間違えても安心）
    const restartHtml =
      '<div class="result-actions"><button class="btn btn--ghost" data-action="restart">もう一度、診断する</button></div>';

    root.innerHTML = `
      <p class="result-eyebrow">Today&rsquo;s Diagnosis</p>
      ${bday ? `<p class="result-personal">${bday}</p>` : ''}

      <div class="result-card" style="--type-accent:${type.accent}">
        <div class="result-symbol">${type.symbol}</div>
        <h2 class="result-type">${type.name}</h2>
        <p class="result-tagline">${phr(type.tagline)}</p>
      </div>

      ${
        rhythm
          ? `<div class="result-rhythm" style="animation-delay:.08s">
        <span class="rhythm-label">Your Nature ─ 生まれ持ったあなたのリズム</span>
        <p class="rhythm-name">${rhythm.symbol}&ensp;${rhythm.name}</p>
        <p class="rhythm-reading">${rhythm.reading}</p>
      </div>`
          : ''
      }

      <div class="result-block result-block--today" style="animation-delay:.15s">
        <span class="block-label">Today</span>
        <p class="verdict">${verdictLabel}</p>
        <p class="block-body">${awareness}</p>
        <p class="block-body">${advice}</p>
      </div>

      <div class="result-block result-block--affirm" style="animation-delay:.45s">
        <span class="block-label">Affirmation</span>
        <p class="affirm-quote">${affirmation}</p>
      </div>

      <div class="result-closing result-message" style="animation-delay:.6s">
        <span class="message-label">Be Grace Message</span>
        <div class="closing-mark">⟡</div>
        <p class="message-body">${message}</p>
      </div>

      ${(mode === 'member' || mode === 'trial30') ? buildJourneyHtml() : ''}

      ${doorHtml}

      ${restartHtml}

      <p class="disclaimer">
        ※ これは医療的な診断ではなく、今日の自分にやさしく気づくための<br />
        セルフケアの診断です。
      </p>
    `;
  }

  function restart() {
    state.birthdate = '';
    state.feelings = [];
    birthY.value = '';
    birthM.value = '';
    birthD.value = '';
    birthPreview.hidden = true;
    document.querySelectorAll('#feelings .chip').forEach((x) => {
      x.classList.remove('is-on', 'is-disabled');
      x.setAttribute('aria-pressed', 'false');
    });
    updateFeelingUI();
    showStep(0);
    show('welcome');
  }

  /* ---------- イベント委譲 ---------- */
  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    if (action === 'start') {
      showStep(0);
      show('quiz');
    } else if (action === 'next') {
      next(Number(t.dataset.from));
    } else if (action === 'back') {
      back();
    } else if (action === 'restart') {
      restart();
    }
  });

  /* ---------- 初期化 ---------- */
  buildFeelings();
  updateFeelingUI();
  if (isLocked()) showLocked(); // 1回／14日を使い切っていたら、入口の代わりに案内画面
})();

    </script>
  </body>
</html>
