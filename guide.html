<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ガイド｜Be Grace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #f6f1e9; --ivory-deep: #ece3d6;
    --ink: #3c3833; --ink-soft: #6b645b; --ink-faint: #9a9286;
    --gold: #b0966a; --line: rgba(60,56,51,0.10);
    --card: rgba(255,255,255,0.55); --accent: #b0966a; --accent-deep: #927742;
    --shadow: 0 18px 50px -28px rgba(70,60,45,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    color: var(--ink); min-height: 100vh; line-height: 1.95; letter-spacing: 0.04em;
    background: radial-gradient(120% 80% at 50% -10%, #fbf8f2 0%, rgba(251,248,242,0) 55%),
                linear-gradient(180deg, var(--ivory) 0%, var(--ivory-deep) 100%);
    background-attachment: fixed; -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 620px; margin: 0 auto; padding: 0 22px; }
  .top { padding: 26px 0 8px; }
  .back { display: inline-flex; align-items: center; gap: 8px; font-family: "Cormorant Garamond", serif;
    font-style: italic; font-size: 15px; letter-spacing: 0.12em; color: var(--ink-soft); text-decoration: none; transition: color .3s; }
  .back:hover { color: var(--ink); }

  .head { text-align: center; padding: 28px 0 6px; }
  .head__en { font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 300; font-size: 15px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }
  .head__name { margin-top: 8px; font-size: clamp(32px, 9vw, 44px); font-weight: 500; letter-spacing: 0.16em; }
  .head__line { width: 1px; height: 40px; margin: 18px auto 0; background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: .7; }

  .lead { text-align: center; font-size: 15px; color: var(--ink-soft); letter-spacing: 0.08em; margin: 30px auto 8px; max-width: 460px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 6px; box-shadow: var(--shadow);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); padding: clamp(24px,5vw,34px); margin: 28px 0; }
  .card__label { text-align: center; font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 14px; letter-spacing: 0.28em; color: var(--accent-deep); text-transform: uppercase; }
  .card__ja { text-align: center; font-size: 13px; letter-spacing: 0.32em; color: var(--ink-faint); margin-top: 6px; margin-bottom: 22px; }

  /* お部屋への案内リスト */
  .nav-list { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: baseline; gap: 14px; padding: 15px 6px;
    border-bottom: 1px solid var(--line); text-decoration: none; color: inherit; transition: padding .3s, color .3s;
  }
  .nav-item:last-child { border-bottom: 0; }
  .nav-item:hover { padding-left: 14px; }
  .nav-item__name { font-size: 18px; letter-spacing: 0.12em; min-width: 84px; }
  .nav-item__copy { font-size: 12.5px; color: var(--ink-soft); letter-spacing: 0.06em; }
  .nav-item__go { margin-left: auto; font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 13px; color: var(--gold); opacity: 0; transition: opacity .3s; }
  .nav-item:hover .nav-item__go { opacity: .85; }
  .nav-item.is-soon .nav-item__name { color: var(--ink-faint); }
  .nav-item__soon { margin-left: auto; font-size: 11px; letter-spacing: 0.2em; color: var(--ink-faint); }

  /* 気楽に聞くボタン */
  .ask { text-align: center; }
  .ask__title { font-size: 16px; letter-spacing: 0.14em; }
  .ask__copy { font-size: 13px; color: var(--ink-soft); margin-top: 8px; letter-spacing: 0.06em; }
  .ask__btn {
    display: inline-block; margin-top: 22px; font-family: inherit; font-size: 15px; letter-spacing: 0.16em;
    color: #fff; background: var(--accent); border: 1px solid var(--accent); border-radius: 999px;
    padding: 15px 38px; text-decoration: none; transition: all .3s;
  }
  .ask__btn:hover { background: var(--accent-deep); border-color: var(--accent-deep); }

  .foot { text-align: center; padding: 30px 0 56px; }
  .foot__title { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 20px; letter-spacing: 0.3em; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a class="back" href="index.html">← Be Grace</a></div>

      <div class="ask__copy">迷ったことも、思いついたことも、<br>小さなきづきも。</div>
      <a class="ask__btn" href="https://chatgpt.com/g/g-6a2cc4f28fa08191827c1bb4abcaa8a6-be-grace-guide" id="askBtn" target="_blank" rel="noopener">なおに話す</a>
    </section>

    <!-- お部屋への案内 -->
    <section class="card">

      <div class="card__ja">お部屋へ</div>

      <div class="nav-list">
        <a class="nav-item" href="rooms/karada.html">

        <a class="nav-item" href="rooms/senzai.html">

          <span class="nav-item__go">入る →</span>
        </a>
        <a class="nav-item" href="rooms/kanjo.html">
          <span class="nav-item__name">LOVE</span>
          <span class="nav-item__copy">愛される私へ</span>
          <span class="nav-item__go">入る →</span>
        </a>
        <a class="nav-item" href="rooms/bi.html">
          <span class="nav-item__name">美</span>
          <span class="nav-item__copy">日々を、美しく</span>
          <span class="nav-item__go">入る →</span>
        </a>
        <a class="nav-item" href="rooms/meguri.html">
          <span class="nav-item__name">巡り</span>
          <span class="nav-item__copy">健やかに、巡る</span>
          <span class="nav-item__go">入る →</span>
        </a>
        <a class="nav-item" href="rooms/kyou.html">
          <span class="nav-item__name">今日の私</span>
          <span class="nav-item__copy">今の私に、気づく</span>
          <span class="nav-item__go">入る →</span>
        </a>
      </div>
    </section>

    <div class="foot"><div class="foot__title">Be Grace</div></div>
  </div>
</body>
</html>
