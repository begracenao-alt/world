<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Be Grace — 本来の自分に還る場所" />
<title>Be Grace｜本来の自分に還る場所</title>
<meta name="theme-color" content="#fcfdfe" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Be Grace" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #fcfdfe;      /* 明るく軽いベース */
    --ivory-deep: #eaf2f6; /* ほんのり涼やかな陰影 */
    --ink: #2f2e2c;        /* くっきり、でも重すぎない */
    --ink-soft: #6c6a64;
    --ink-faint: #a6a29b;
    --gold: #3a96bf;       /* アクセント＝水色（呼吸・ギフトとおそろい） */
    --line: rgba(50, 60, 70, 0.10);
    --card: rgba(255, 255, 255, 0.66);
    --card-hover: rgba(255, 255, 255, 0.9);
    --shadow: 0 20px 50px -30px rgba(60, 90, 110, 0.32);

    /* 各お部屋のほのかな色（水色トーンで統一・濃淡で変化） */
    --c-karada: #c46b72;   /* 體 — 第1ルート・赤（土台・グラウンディング） */
    --c-senzai: #9b85c0;   /* 潜在意識 — 第6第三の目・藍（直感） */
    --c-kanjo:  #6fae8f;   /* Love — 第4ハート・緑（愛） */
    --c-bi:     #d6b35c;   /* 美 — 第3太陽神経叢・黄金（輝き） */
    --c-meguri: #5aa8ca;   /* 巡り — 第5喉・水色（呼吸・流れ） */
    --c-kyou:   #9b85c0;   /* 今日の私 — 第7クラウン・紫（気づき） */
    --c-diary:  #df9b63;   /* Diary — 第2仙骨・橙（日々の創造） */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: var(--ink);
    background:
      radial-gradient(125% 95% at 50% -12%, #ffffff 0%, rgba(255,255,255,0) 52%),
      linear-gradient(165deg, #f5fbfd 0%, #e7f3f9 45%, #d8ebf4 100%);
    background-attachment: fixed;
    line-height: 1.9;
    letter-spacing: 0.04em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .wrap {
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ====== 表紙 / Hero ====== */
  .hero {
    text-align: center;
    padding: clamp(88px, 16vh, 168px) 0 clamp(56px, 9vh, 104px);
    position: relative;
  }

  .hero__mark {
    display: block;
    width: clamp(120px, 32vw, 184px);
    height: clamp(120px, 32vw, 184px);
    border-radius: 50%;
    margin: 4px auto 40px;
    background:
      radial-gradient(circle at 50% 44%, rgba(255,255,255,0.72), rgba(255,255,255,0) 60%),
      radial-gradient(circle at 32% 24%, rgba(214,145,154,0.75), transparent 58%),
      radial-gradient(circle at 68% 22%, rgba(243,162,79,0.70), transparent 58%),
      radial-gradient(circle at 86% 50%, rgba(201,168,95,0.65), transparent 58%),
      radial-gradient(circle at 72% 82%, rgba(111,174,143,0.70), transparent 58%),
      radial-gradient(circle at 30% 84%, rgba(90,168,202,0.72), transparent 58%),
      radial-gradient(circle at 13% 54%, rgba(111,120,184,0.70), transparent 58%),
      radial-gradient(circle at 50% 60%, rgba(179,160,219,0.55), transparent 62%);
    box-shadow: 0 0 60px rgba(150,160,210,0.35), inset 0 0 30px rgba(255,255,255,0.4);
    opacity: 0.96;
    animation: breathe 7s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(0.96); }
    50% { transform: scale(1.04); }
  }

  .hero__title {
    font-family: "Cormorant Garamond", "Shippori Mincho", serif;
    font-weight: 300;
    font-size: clamp(40px, 8vw, 84px);
    letter-spacing: 0.12em;
    line-height: 1.08;
    color: var(--ink);
  }

  .hero__sub {
    margin-top: 30px;
    font-size: clamp(14px, 3.6vw, 19px);
    letter-spacing: 0.34em;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .hero__sub::before,
  .hero__sub::after {
    content: "";
    display: inline-block;
    width: clamp(22px, 8vw, 46px);
    height: 1px;
    vertical-align: middle;
    background: var(--line);
    margin: 0 18px 6px;
  }

  /* ====== セクション見出し ====== */
  .section-label {
    text-align: center;
    margin-bottom: clamp(34px, 6vh, 56px);
  }
  .section-label__en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .section-label__ja {
    margin-top: 8px;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
  }

  /* ====== 6つのお部屋 ====== */
  .rooms { padding-bottom: clamp(64px, 11vh, 120px); }

  .rooms__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(14px, 2vw, 26px);
  }

  .room {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: clamp(190px, 26vw, 248px);
    padding: clamp(22px, 3vw, 34px);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: var(--shadow);
    cursor: pointer;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform .55s cubic-bezier(.2,.7,.2,1),
                background .55s ease, box-shadow .55s ease;
  }

  /* 上辺のほのかな色帯 */
  .room::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    opacity: 0.85;
    transition: opacity .55s ease, height .55s ease;
  }
  /* 部屋に灯る、にじむ光 */
  .room::after {
    content: "";
    position: absolute;
    right: -18%;
    bottom: -28%;
    width: 92%;
    height: 96%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 66%);
    opacity: 0.20;
    transition: opacity .6s ease, transform .6s ease;
    pointer-events: none;
  }

  .room:hover,
  .room:focus-visible {
    transform: translateY(-7px);
    background: var(--card-hover);
    box-shadow: 0 28px 60px -26px rgba(70, 60, 45, 0.5);
    outline: none;
  }
  .room:hover::before,
  .room:focus-visible::before { opacity: 0.9; height: 4px; }
  .room:hover::after,
  .room:focus-visible::after { opacity: 0.34; transform: scale(1.15); }

  .room__num {
    font-family: "Cormorant Garamond", serif;
    font-size: 13px;
    letter-spacing: 0.24em;
    color: var(--accent);
    font-weight: 500;
  }

  .room__name {
    font-size: clamp(27px, 4.4vw, 38px);
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ink);
    margin-top: auto;
  }

  /* 英字タイトルの部屋（LOVE）— やわらかく軽い印象に */
  .room__name--en {
    font-family: "Cormorant Garamond", serif;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: clamp(32px, 5.4vw, 48px);
  }

  .room__copy {
    margin-top: 12px;
    font-size: clamp(12.5px, 2.4vw, 14.5px);
    letter-spacing: 0.10em;
    color: var(--ink-soft);
  }

  .room__enter {
    margin-top: 18px;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--accent);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .room:hover .room__enter,
  .room:focus-visible .room__enter { opacity: 0.85; transform: translateX(0); }

  /* 横長の1枚（Diary）— どの画面でも「浮かず」幅いっぱいに据える */
  .room--wide {
    grid-column: 1 / -1;
    align-items: center;
    text-align: center;
    justify-content: center;
    min-height: clamp(150px, 22vw, 190px);
  }
  .room--wide .room__num { position: static; margin-bottom: 10px; }
  .room--wide .room__name { margin-top: 0; }
  .room--wide .room__copy { margin-top: 10px; }
  .room--wide .room__enter { margin-top: 14px; }
  /* にじむ光を中央寄りに */
  .room--wide::after { right: 50%; transform: translateX(50%); bottom: -50%; width: 60%; }
  .room--wide:hover::after,
  .room--wide:focus-visible::after { transform: translateX(50%) scale(1.15); }

  /* ====== NEWS ====== */
  .news { padding-bottom: clamp(80px, 14vh, 140px); }

  .news__panel {
    max-width: 760px;
    margin: 0 auto;
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: clamp(28px, 5vw, 48px) clamp(24px, 5vw, 56px);
  }

  .news__head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .news__en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }
  .news__ja {
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
  }

  .news__empty {
    margin-top: 22px;
    font-size: 13.5px;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
  }
  .news__empty::before {
    content: "—";
    margin-right: 12px;
    color: var(--gold);
  }

  /* ====== ライブラリー / ガイド（お部屋とは別の“ご案内”） ====== */
  .extras { padding: clamp(6px, 2vh, 18px) 0 clamp(74px, 12vh, 130px); }
  .extras__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 520px;
    margin: 0 auto;
    border-top: 1px solid var(--line);
  }
  .extra {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 9px;
    padding: clamp(30px, 7vw, 44px) 16px;
    text-decoration: none;
    color: inherit;
    transition: transform .5s cubic-bezier(.2,.7,.2,1), opacity .4s ease;
  }
  .extra:first-child { border-right: 1px solid var(--line); }
  .extra:hover, .extra:focus-visible { transform: translateY(-4px); outline: none; }
  .extra__en {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(22px, 5.5vw, 28px);
    letter-spacing: 0.14em;
    color: var(--gold);
  }
  .extra__copy { font-size: 12.5px; letter-spacing: 0.2em; color: var(--ink-soft); }

  /* ====== フッター ====== */
  .foot {
    text-align: center;
    padding: 38px 0 56px;
    border-top: 1px solid var(--line);
  }
  .foot__title {
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
  }
  .foot__note {
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
  }

  /* ====== 登場アニメーション ====== */
  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { opacity: 0; animation: rise 1.1s cubic-bezier(.2,.7,.2,1) forwards; }
  .d1 { animation-delay: .15s; } .d2 { animation-delay: .3s; }
  .d3 { animation-delay: .45s; } .d4 { animation-delay: .6s; }
  .d5 { animation-delay: .72s; } .d6 { animation-delay: .84s; }
  .d7 { animation-delay: .96s; } .d8 { animation-delay: 1.08s; }
  .d9 { animation-delay: 1.2s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; }
    html { scroll-behavior: auto; }
  }

  /* ====== レスポンシブ ====== */
  @media (max-width: 720px) {
    .rooms__grid { grid-template-columns: repeat(2, 1fr); }
    .hero__sub { letter-spacing: 0.22em; }
    body { letter-spacing: 0.03em; }
    /* スマホは常に「enter →」を控えめに表示（タップできると伝わるように） */
    .room__enter { opacity: 0.7; transform: none; }
    .room__copy { line-height: 1.7; }
  }
  @media (max-width: 430px) {
    .wrap { padding: 0 18px; }
    .rooms__grid { gap: 12px; }
    .room {
      min-height: 184px;
      padding: 22px 18px;
      justify-content: flex-end;
    }
    .room__num { position: absolute; top: 18px; left: 18px; }
    .room__name { font-size: 26px; letter-spacing: 0.10em; }
    .room__copy { margin-top: 9px; font-size: 12.5px; letter-spacing: 0.04em; }
    .room__enter { margin-top: 13px; font-size: 11px; }
    .hero__sub::before, .hero__sub::after { width: 18px; margin: 0 10px 5px; }
    .news__panel { padding: 26px 22px; }
  }
  /* ごく小さい端末（iPhone SE 等） */
  @media (max-width: 360px) {
    .room__name { font-size: 23px; }
    .room__copy { font-size: 12px; }
  }
</style>
</head>
<body>

  <!-- ===== 表紙 ===== -->
  <header class="hero">
    <div class="wrap">
      <span class="hero__mark reveal"></span>
      <h1 class="hero__title reveal d1">Be Grace</h1>
      <p class="hero__sub reveal d2">本来の自分に還る場所</p>
    </div>
  </header>

  <main>
    <!-- ===== 6つのお部屋 ===== -->
    <section class="rooms" aria-label="6つのお部屋">
      <div class="wrap">
        <div class="rooms__grid">
          <a class="room reveal d3" style="--accent: var(--c-karada);" href="rooms/karada.html" aria-label="體のお部屋へ">
            <span class="room__num">01</span>
            <span class="room__name">體</span>
            <span class="room__copy">整える、リセット習慣</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room reveal d4" style="--accent: var(--c-senzai);" href="rooms/senzai.html" aria-label="潜在意識のお部屋へ">
            <span class="room__num">02</span>
            <span class="room__name">潜在意識</span>
            <span class="room__copy">奥の静けさへ</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room reveal d5" style="--accent: var(--c-kanjo);" href="rooms/kanjo.html" aria-label="感情のお部屋へ">
            <span class="room__num">03</span>
            <span class="room__name room__name--en">Love</span>
            <span class="room__copy">愛される私へ</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room reveal d6" style="--accent: var(--c-bi);" href="rooms/bi.html" aria-label="美のお部屋へ">
            <span class="room__num">04</span>
            <span class="room__name">美</span>
            <span class="room__copy">日々を、美しく</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room reveal d7" style="--accent: var(--c-meguri);" href="rooms/meguri.html" aria-label="巡りのお部屋へ">
            <span class="room__num">05</span>
            <span class="room__name">巡り</span>
            <span class="room__copy">健やかに、巡る</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room reveal d8" style="--accent: var(--c-kyou);" href="rooms/kyou.html" aria-label="今日の私のお部屋へ">
            <span class="room__num">06</span>
            <span class="room__name">今日の私</span>
            <span class="room__copy">今の私に、気づく</span>
            <span class="room__enter">enter →</span>
          </a>

          <a class="room room--wide reveal d9" style="--accent: var(--c-diary);" href="rooms/diary.html" aria-label="Diaryへ">
            <span class="room__num">毎日の記録</span>
            <span class="room__name room__name--en">Diary</span>
            <span class="room__copy">重ねた日々を、綴る</span>
            <span class="room__enter">enter →</span>
          </a>
        </div>
      </div>
    </section>

    <!-- ===== ライブラリー / ガイド ===== -->
    <section class="extras" aria-label="ライブラリーとガイド">
      <div class="wrap">
        <div class="extras__grid">
          <a class="extra reveal d9" href="library.html" aria-label="ライブラリーへ">
            <span class="extra__en">Library</span>
            <span class="extra__copy">動画・資料</span>
          </a>
          <a class="extra reveal d9" href="guide.html" aria-label="ガイドへ">
            <span class="extra__en">Guide</span>
            <span class="extra__copy">聞いてみる</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== フッター ===== -->
  <footer class="foot">
    <div class="wrap">
      <div class="foot__title">Be Grace</div>
      <div class="foot__note">本来の自分に還る場所</div>
    </div>
  </footer>

</body>
</html>
