<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ライブラリー｜Be Grace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory: #fcfdfe; --ivory-deep: #eaf2f6;
    --ink: #2f2e2c; --ink-soft: #6c6a64; --ink-faint: #a6a29b;
    --gold: #3a96bf; --line: rgba(60,56,51,0.10);
    --card: rgba(255,255,255,0.55); --accent: #3a96bf; --accent-deep: #927742;
    --shadow: 0 18px 50px -28px rgba(70,60,45,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
    color: var(--ink); min-height: 100vh; line-height: 1.95; letter-spacing: 0.04em;
    background: radial-gradient(120% 80% at 50% -10%, #fbfdff 0%, rgba(251,248,242,0) 55%),
                linear-gradient(180deg, var(--ivory) 0%, var(--ivory-deep) 100%);
    background-attachment: fixed; -webkit-font-smoothing: antialiased;
  }
  .wrap { width: 100%; max-width: 640px; margin: 0 auto; padding: 0 22px; }
  .top { padding: 26px 0 8px; }
  .back { display: inline-flex; align-items: center; gap: 8px; font-family: "Cormorant Garamond", serif;
    font-style: italic; font-size: 15px; letter-spacing: 0.12em; color: var(--ink-soft); text-decoration: none; transition: color .3s; }
  .back:hover { color: var(--ink); }

  .head { text-align: center; padding: 60px 0 6px; }
  .head__en { font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 300; font-size: 15px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }
  .head__name { margin-top: 8px; font-size: clamp(36px, 10vw, 52px); font-weight: 500; letter-spacing: 0.16em; }
  .head__line { width: 1px; height: 40px; margin: 22px auto 0; background: linear-gradient(180deg, transparent, var(--accent), transparent); opacity: .7; }

  .lead { text-align: center; font-size: 15px; color: var(--ink-soft); letter-spacing: 0.08em; margin: 36px auto 8px; max-width: 480px; line-height: 2.1; }
  .sub  { text-align: center; font-size: 13px; color: var(--ink-faint); letter-spacing: 0.16em; margin: 0 auto 38px; }

  .cta { display: flex; justify-content: center; margin: 12px 0 30px; }
  .cta__btn {
    display: inline-block;
    font-family: inherit; font-size: 15px; letter-spacing: 0.22em;
    color: #fff; background: var(--accent); text-decoration: none;
    padding: 16px 38px; border-radius: 999px;
    box-shadow: 0 14px 32px -16px rgba(58,150,191,0.7);
    transition: all .3s;
  }
  .cta__btn:hover { background: var(--accent-deep); box-shadow: 0 18px 36px -14px rgba(146,119,66,0.55); }
  .cta__arrow { display: inline-block; margin-left: 8px; transition: transform .3s; }
  .cta__btn:hover .cta__arrow { transform: translateX(4px); }

  .note { text-align: center; font-size: 12px; color: var(--ink-faint); letter-spacing: 0.1em; margin: 24px auto 0; line-height: 1.9; max-width: 460px; }

  .foot { text-align: center; padding: 80px 0 56px; }
  .foot__title { font-family: "Cormorant Garamond", serif; font-weight: 300; font-size: 20px; letter-spacing: 0.3em; color: var(--ink-soft); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a class="back" href="index.html">← Be Grace</a></div>

    <div class="head">
      <div class="head__name" style="font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:0.2em;">Library</div>
      <div class="head__line"></div>
    </div>

    <p class="lead">アーカイブと 資料は、<br>こちらに まとめています。</p>
    <p class="sub">すきなときに、どうぞ🤍</p>

    <div class="cta">
      <a class="cta__btn" href="https://begracenao.com/library/" target="_blank" rel="noopener">
        ライブラリーへ<span class="cta__arrow">→</span>
      </a>
    </div>

    <p class="note">別の窓で ひらきます。<br>もどるときは、左上の「← Be Grace」から。</p>

    <div class="foot"><div class="foot__title">Be Grace</div></div>
  </div>
</body>
</html>
